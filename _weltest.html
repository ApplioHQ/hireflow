<!doctype html><html><head><meta charset=utf-8>
<link rel="stylesheet" href="css/styles.css"><link rel="stylesheet" href="css/home.css">
<style>body{margin:0}</style></head><body>
<div id="welcome-overlay" style="position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;">
  <div class="wel-bg"></div>
  <div class="wel-card">
    <div class="wel-logo"><img src="logo.svg" alt="Applio" style="width:66px;height:66px;border-radius:18px"></div>
    <div class="wel-eyebrow">Welcome to Applio</div>
    <h1 class="wel-title">Let's land you<br>more interviews.</h1>
    <p class="wel-sub">Already have a resume? Paste it and AI fills in every section in seconds. Starting fresh? Jump right in.</p>
    <div class="wel-actions" style="display:flex; flex-direction:column; align-items:center; gap:14px;">
      <button class="wel-btn" type="button">✨ Paste my existing resume</button>
      <button type="button" style="background:none; border:0; color:rgba(255,255,255,.8); font-size:14px; font-weight:600; cursor:pointer; padding:4px 8px;">Start from scratch →</button>
    </div>
  </div>
</div></body></html>
