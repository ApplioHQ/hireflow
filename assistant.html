<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Career Coach, Applio</title>
<link rel="icon" href="logo.ico">
<link rel="stylesheet" href="css/styles.css">
<script src="js/theme.js"></script>
<style>
  /* ===== Layout + ambient animated aurora ===== */
  html, body.app-body { overflow-x: hidden; }   /* fixed aurora / wide topbar can never push the chat off-screen */
  .ca-wrap { position: relative; width: 100%; max-width: 860px; margin: 0 auto; padding: 24px 20px 0; display: flex; flex-direction: column; height: calc(100vh - 62px); box-sizing: border-box; }
  /* Ambient aurora lives in its OWN fixed, viewport-clipped layer. Because the
     layer is inset:0 + overflow:hidden, its blurred blobs (with negative offsets)
     are clipped to the viewport and can never widen the document or shift content
     — the earlier ::before/::after on .ca-wrap could leak overflow in some browsers. */
  .ca-aurora { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
  .ca-aurora i { position: absolute; display: block; border-radius: 50%; filter: blur(72px); opacity: .55; }
  .ca-aurora i:first-child { width: 520px; height: 520px; top: -150px; left: -90px; background: radial-gradient(circle, rgba(99,102,241,.32), transparent 70%); animation: caDrift1 19s ease-in-out infinite; }
  .ca-aurora i:last-child  { width: 460px; height: 460px; bottom: -130px; right: -70px; background: radial-gradient(circle, rgba(139,92,246,.28), transparent 70%); animation: caDrift2 23s ease-in-out infinite; }
  @keyframes caDrift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(64px,44px); } }
  @keyframes caDrift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-54px,-34px); } }

  /* ===== Header ===== */
  .ca-head { display: flex; align-items: center; gap: 11px; margin-bottom: 4px; }
  .ca-head h2 { font-size: 20px; margin: 0; display: flex; align-items: center; gap: 9px; }
  .ca-live { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: #10b981; background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.32); padding: 3px 10px; border-radius: 999px; letter-spacing: .03em; }
  .ca-live::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: caPulseDot 2s infinite; }
  @keyframes caPulseDot { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,.55); } 70% { box-shadow: 0 0 0 6px rgba(16,185,129,0); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }
  .ca-sub { color: var(--muted); font-size: 13px; margin: 0 0 14px; }
  .ca-clear { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; margin-left: auto; transition: color .15s; }
  .ca-clear:hover { color: var(--text); }

  /* ===== Thread + messages ===== */
  .ca-thread { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding: 6px 2px 16px; scroll-behavior: smooth; }
  .ca-msg { display: flex; gap: 11px; max-width: 88%; }
  .ca-msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .ca-in { animation: caRise .42s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes caRise { from { opacity: 0; transform: translateY(14px) scale(.97); } to { opacity: 1; transform: none; } }

  .ca-avatar { flex-shrink: 0; width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; position: relative; }
  .ca-msg.assistant .ca-avatar { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; box-shadow: 0 6px 16px rgba(99,102,241,.42); }
  .ca-msg.user .ca-avatar { background: var(--bg-3); color: var(--text); }
  .ca-avatar-live::after { content: ""; position: absolute; inset: -3px; border-radius: 13px; border: 2px solid rgba(99,102,241,.55); animation: caRing 1.4s ease-out infinite; }
  @keyframes caRing { 0% { transform: scale(.9); opacity: .8; } 100% { transform: scale(1.45); opacity: 0; } }

  .ca-bubble { padding: 12px 15px; border-radius: 16px; font-size: 14px; line-height: 1.6; position: relative; }
  .ca-msg.assistant .ca-bubble { background: var(--bg-2); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 5px; box-shadow: 0 4px 18px rgba(0,0,0,.06); }
  .ca-msg.user .ca-bubble { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; border-top-right-radius: 5px; box-shadow: 0 6px 20px rgba(99,102,241,.35); }
  .ca-bubble p { margin: 0 0 8px; } .ca-bubble p:last-child { margin-bottom: 0; }
  .ca-bubble ul { margin: 6px 0; padding-left: 18px; } .ca-bubble li { margin: 3px 0; }
  .ca-bubble strong { font-weight: 700; }
  .ca-typing-caret p:last-child::after { content: "▋"; display: inline-block; margin-left: 1px; color: var(--accent); animation: caCaret .9s steps(1) infinite; }
  @keyframes caCaret { 50% { opacity: 0; } }

  /* Typing indicator */
  .ca-typing { display: flex; align-items: center; gap: 5px; padding: 15px 16px; }
  .ca-typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: .5; animation: caBounce 1.1s infinite ease-in-out; }
  .ca-typing span:nth-child(2) { animation-delay: .15s; } .ca-typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes caBounce { 0%,60%,100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-5px); opacity: 1; } }

  /* ===== Suggestion chips ===== */
  .ca-chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 14px; }
  .ca-chip { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; padding: 9px 15px; border-radius: 999px; background: var(--bg-2); border: 1px solid var(--border); color: var(--text); cursor: pointer; transition: color .18s, transform .12s, box-shadow .18s, border-color .18s; animation: caRise .5s cubic-bezier(.2,.8,.2,1) both; }
  .ca-chip:nth-child(1) { animation-delay: .05s; } .ca-chip:nth-child(2) { animation-delay: .12s; }
  .ca-chip:nth-child(3) { animation-delay: .19s; } .ca-chip:nth-child(4) { animation-delay: .26s; }
  .ca-chip svg { width: 15px; height: 15px; opacity: .7; flex-shrink: 0; transition: opacity .18s, transform .18s; }
  .ca-chip:hover { color: var(--accent); transform: translateY(-2px); border-color: transparent; box-shadow: 0 8px 22px rgba(99,102,241,.22), inset 0 0 0 1.5px rgba(99,102,241,.55); }
  .ca-chip:hover svg { opacity: 1; transform: scale(1.12); }

  /* ===== Glassy composer ===== */
  .ca-input-row { position: relative; display: flex; gap: 8px; align-items: flex-end; padding: 8px; margin-bottom: 18px; border: 1px solid var(--border); border-radius: 18px; background: var(--bg-2); box-shadow: 0 10px 34px rgba(0,0,0,.12); transition: box-shadow .2s, border-color .2s; }
  .ca-input-row:focus-within { border-color: transparent; box-shadow: 0 14px 40px rgba(99,102,241,.22), inset 0 0 0 1.5px var(--accent); }
  .ca-input { flex: 1; resize: none; max-height: 160px; padding: 10px 12px; background: transparent; border: 0; color: var(--text); font-size: 14px; font-family: inherit; line-height: 1.5; }
  .ca-input:focus { outline: none; }
  .ca-send { flex-shrink: 0; height: 44px; width: 44px; border-radius: 13px; border: 0; background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .14s, box-shadow .18s, opacity .15s; box-shadow: 0 6px 18px rgba(99,102,241,.4); }
  .ca-send:hover:not(:disabled) { transform: translateY(-2px) scale(1.05); box-shadow: 0 10px 26px rgba(99,102,241,.55); }
  .ca-send:active:not(:disabled) { transform: translateY(0) scale(.95); }
  .ca-send:disabled { opacity: .45; cursor: default; box-shadow: none; }
  .ca-send svg { transition: transform .18s; }
  .ca-send:hover:not(:disabled) svg { transform: translateX(2px); }

  /* ===== Hero empty state ===== */
  .ca-empty { text-align: center; color: var(--muted); margin: auto 0; position: relative; padding: 20px; animation: caRise .6s ease both; }
  .ca-hero-badge { position: relative; width: 66px; height: 66px; border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; margin-bottom: 18px; box-shadow: 0 14px 40px rgba(99,102,241,.5); animation: caFloat 4s ease-in-out infinite; }
  .ca-hero-badge::before { content: ""; position: absolute; inset: -6px; border-radius: 26px; background: conic-gradient(from 0deg, #6366f1, #8b5cf6, #ec4899, #6366f1); filter: blur(11px); opacity: .55; z-index: -1; animation: caSpin 6s linear infinite; }
  @keyframes caFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes caSpin { to { transform: rotate(360deg); } }
  .ca-hero-badge svg { width: 32px; height: 32px; margin: 0; }
  .ca-empty h1 { font-size: 32px; font-weight: 800; letter-spacing: -.02em; margin: 0; background: linear-gradient(120deg, var(--text), var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .ca-empty .ca-hero-sub { font-size: 14.5px; margin-top: 10px; }

  /* ===== Sleek scrollbars ===== */
  .ca-thread, .ca-input { scrollbar-width: thin; scrollbar-color: rgba(148,163,184,.35) transparent; }
  .ca-thread::-webkit-scrollbar, .ca-input::-webkit-scrollbar { width: 8px; }
  .ca-thread::-webkit-scrollbar-track, .ca-input::-webkit-scrollbar-track { background: transparent; }
  .ca-thread::-webkit-scrollbar-thumb, .ca-input::-webkit-scrollbar-thumb { background: rgba(148,163,184,.28); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  .ca-thread:hover::-webkit-scrollbar-thumb, .ca-input:hover::-webkit-scrollbar-thumb { background: rgba(148,163,184,.5); background-clip: padding-box; }
  .ca-thread::-webkit-scrollbar-thumb:hover, .ca-input::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,.7); background-clip: padding-box; }

  /* ===== Respect reduced-motion ===== */
  @media (prefers-reduced-motion: reduce) {
    .ca-aurora i, .ca-in, .ca-chip, .ca-hero-badge, .ca-hero-badge::before,
    .ca-avatar-live::after, .ca-typing span, .ca-live::before, .ca-typing-caret p:last-child::after { animation: none !important; }
    .ca-thread { scroll-behavior: auto; }
  }
</style>
</head>
<body class="app-body">
<div class="ca-aurora" aria-hidden="true"><i></i><i></i></div>
<header class="app-topbar">
  <div class="brand"><img src="logo.jpeg" width="32" height="32" class="brand-logo" alt="Applio"><span>Applio</span></div>
  <nav class="topbar-tabs">
    <a class="topbar-tab" href="dashboard">Home</a>
    <a class="topbar-tab" href="autopilot">Autopilot</a>
    <a class="topbar-tab" href="editor">Resume Builder</a>

    <a class="topbar-tab" href="interview">Interview Prep</a>

<div class="ca-wrap">
  <div class="ca-head">
    <h2 id="ca-title"></h2>
    <span class="ca-live" id="ca-live">Online</span>
    <button class="ca-clear" id="ca-clear" onclick="clearChat()" style="display:none;">Clear chat</button>
  </div>
  <p class="ca-sub">Your AI career coach. It knows your resume and can help with rewrites, tailoring, interviews, job strategy, cover letters, and more.</p>
  <p class="ca-free" id="ca-free" style="display:none; margin:-6px 0 12px; font-size:12.5px; color:var(--muted);"></p>

  <div class="ca-thread" id="ca-thread"></div>

  <div class="ca-chips" id="ca-chips">
    <button class="ca-chip" onclick="askChip(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg><span>Review my resume and tell me what to fix</span></button>
    <button class="ca-chip" onclick="askChip(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg><span>Write me a cover letter opening</span></button>
    <button class="ca-chip" onclick="askChip(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><span>What roles am I a good fit for?</span></button>
    <button class="ca-chip" onclick="askChip(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Prep me for a behavioral interview</span></button>
  </div>

  <div class="ca-input-row">
    <textarea class="ca-input" id="ca-input" rows="1" placeholder="Ask your career coach anything…" oninput="autogrow(this)" onkeydown="onKey(event)"></textarea>
    <button class="ca-send" id="ca-send" onclick="send()" aria-label="Send" title="Send"></button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/notify.js"></script>
<script src="js/plan.js"></script>
<script src="js/health-badge.js"></script>
<script>
const API = window.HIREFLOW_CONFIG.API_URL;
const TOKEN = localStorage.getItem('hf_token');
if (!TOKEN) location.href = 'login';
const STORE = 'hf_assistant_chat';
const AV = '✦';

let messages = (function () {
  try { const m = JSON.parse(localStorage.getItem(STORE) || '[]'); return Array.isArray(m) ? m : []; }
  catch { return []; }
})();
let busy = false;
let renderedCount = 0;   // how many messages are currently painted (incremental render)

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function signOut(){ localStorage.removeItem('hf_token'); localStorage.removeItem('hf_email'); location.href='index'; }
function _resume(){ try { return JSON.parse(localStorage.getItem('hf_resume') || '{}') || {}; } catch { return {}; } }
function _reduced(){ try { return matchMedia('(prefers-reduced-motion: reduce)').matches; } catch { return false; } }

// Light markdown → HTML: paragraphs, bullet lists, **bold**. (Input is escaped first.)
function fmt(text){
  const lines = esc(text).split('\n');
  let html = '', inUl = false;
  const closeUl = () => { if (inUl) { html += '</ul>'; inUl = false; } };
  for (let raw of lines) {
    const line = raw.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    const m = line.match(/^\s*(?:[-*•]|\d+\.)\s+(.*)$/);
    if (m) { if (!inUl) { html += '<ul>'; inUl = true; } html += '<li>' + m[1] + '</li>'; }
    else if (line.trim() === '') { closeUl(); }
    else { closeUl(); html += '<p>' + line + '</p>'; }
  }
  closeUl();
  return html || '<p></p>';
}

function _bubbleInner(m){
  return m.role === 'user'
    ? '<p>' + esc(m.content).replace(/\n/g,'<br>') + '</p>'
    : fmt(m.content);
}

const HERO = `<div class="ca-empty">
  <div class="ca-hero-badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/><path d="M19 3v4M21 5h-4M5 17v2M6 18H4"/></svg>
  </div>
  <h1>Applio AI</h1>
  <div class="ca-hero-sub">Your personal career coach. It knows your resume. Just start typing below.</div>
</div>`;

// Word-by-word reveal so a fresh reply feels like it's being written live, then
// swap in fully-formatted markdown once complete. Skipped for reduced-motion.
function typeWriter(bubble, content){
  const thread = document.getElementById('ca-thread');
  const done = () => { bubble.classList.remove('ca-typing-caret'); bubble.innerHTML = fmt(content); if (thread) thread.scrollTop = thread.scrollHeight; };
  if (_reduced()) { done(); return; }
  const tokens = String(content).replace(/\*\*(.+?)\*\*/g, '$1').split(/(\s+)/);
  const total = tokens.length;
  const per = Math.max(1, Math.ceil(total / 55));   // ~55 frames total, snappy for any length
  bubble.classList.add('ca-typing-caret');
  bubble.innerHTML = '<p></p>';
  const p = bubble.querySelector('p');
  let i = 0;
  const step = () => {
    i += per;
    p.textContent = tokens.slice(0, i).join('');
    if (thread) thread.scrollTop = thread.scrollHeight;
    if (i < total) setTimeout(step, 18);
    else done();
  };
  step();
}

// Incremental render: append only new messages (so old ones don't re-animate),
// manage the transient typing indicator, and reveal freshly-arrived replies.
function render(){
  const thread = document.getElementById('ca-thread');
  const hasMsgs = messages.length > 0;
  document.getElementById('ca-chips').style.display = hasMsgs ? 'none' : 'flex';
  document.getElementById('ca-clear').style.display = hasMsgs ? '' : 'none';
  if (!hasMsgs) { thread.innerHTML = HERO; renderedCount = 0; return; }
  if (renderedCount === 0) thread.innerHTML = '';                     // clear the hero
  const oldTyping = thread.querySelector('.ca-typing-msg'); if (oldTyping) oldTyping.remove();
  for (let i = renderedCount; i < messages.length; i++) {
    const m = messages[i];
    const el = document.createElement('div');
    el.className = 'ca-msg ' + m.role + ' ca-in';
    el.style.animationDelay = ((i - renderedCount) * 0.05) + 's';    // gentle stagger on first paint
    el.innerHTML = '<div class="ca-avatar">' + (m.role === 'user' ? 'You' : AV) + '</div><div class="ca-bubble"></div>';
    const bubble = el.querySelector('.ca-bubble');
    thread.appendChild(el);
    if (m.role === 'assistant' && m._reveal) { delete m._reveal; typeWriter(bubble, m.content); }
    else bubble.innerHTML = _bubbleInner(m);
  }
  renderedCount = messages.length;
  if (busy) {
    const t = document.createElement('div');
    t.className = 'ca-msg assistant ca-typing-msg ca-in';
    t.innerHTML = '<div class="ca-avatar ca-avatar-live">' + AV + '</div><div class="ca-bubble ca-typing"><span></span><span></span><span></span></div>';
    thread.appendChild(t);
  }
  thread.scrollTop = thread.scrollHeight;
}

// Free-tier taste: show how many coach messages remain (undefined = paid/unlimited).
function _showFreeRemaining(n){
  const el = document.getElementById('ca-free');
  if (!el) return;
  if (typeof n !== 'number') { el.style.display = 'none'; return; }
  el.style.display = '';
  el.innerHTML = n > 0
    ? `${n} free coach message${n === 1 ? '' : 's'} left. <a href="pricing" style="color:var(--accent);font-weight:600;">Go unlimited →</a>`
    : `That was your last free message. <a href="pricing" style="color:var(--accent);font-weight:600;">Upgrade to keep chatting →</a>`;
}
// Persist without transient UI flags (never re-typewrite history on reload).
function _save(){ try { localStorage.setItem(STORE, JSON.stringify(messages.slice(-30).map(m => ({ role: m.role, content: m.content })))); } catch(e){} }
function clearChat(){ messages = []; renderedCount = 0; _save(); render(); }
function autogrow(el){ el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160) + 'px'; }
function onKey(e){ if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function askChip(btn){ document.getElementById('ca-input').value = btn.textContent; send(); }

function _isFreeUser(){ return typeof isFree === 'function' ? isFree() : false; }

// Career Coach is Premium-only: show a gate and lock the composer for free users.
function _showPremiumGate(){
  const chips = document.getElementById('ca-chips'); if (chips) chips.style.display = 'none';
  const free = document.getElementById('ca-free'); if (free) free.style.display = 'none';
  const live = document.getElementById('ca-live'); if (live) live.style.display = 'none';
  const thread = document.getElementById('ca-thread');
  renderedCount = 0;
  if (thread) thread.innerHTML =
    '<div class="ca-empty">'
    + '<div class="ca-hero-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l4 5 5-7 5 7 4-5v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>'
    + '<h1>Career Coach is Premium</h1>'
    + '<div class="ca-hero-sub" style="max-width:420px;margin:8px auto 18px;">Your personal AI coach that knows your resume and helps with rewrites, tailoring, interviews, and job strategy, unlimited, on Premium or Lifetime.</div>'
    + '<a class="btn btn-primary" href="pricing">' + ICON('sparkle','ico ico-sm') + ' See plans</a>'
    + '</div>';
  const row = document.querySelector('.ca-input-row');
  if (row) row.style.display = 'none';
}

async function send(){
  if (_isFreeUser()) { _showPremiumGate(); return; }
  const input = document.getElementById('ca-input');
  const text = (input.value || '').trim();
  if (!text || busy) return;
  messages.push({ role: 'user', content: text });
  input.value = ''; autogrow(input);
  busy = true; _save(); render();
  document.getElementById('ca-send').disabled = true;
  try {
    const r = await fetch(API + '/ai/assistant', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
      body: JSON.stringify({ messages: messages, resume: _resume() })
    });
    if (r.status === 402) {
      busy = false; render();
      if (typeof showUpgradeModal === 'function') showUpgradeModal('ai', 'assistant');
      else toast('Career Coach is a Premium feature.', { type: 'warn' });
      return;
    }
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || ('Request failed (' + r.status + ')'));
    messages.push({ role: 'assistant', content: data.reply || 'Sorry, I could not generate a response, please try again.', _reveal: true });
    _showFreeRemaining(data.freeRemaining);
  } catch (e) {
    const m = (e && e.message) || '';
    const friendly = /usage limit|limit reached|quota|neuron|429/i.test(m)
      ? 'The daily AI limit was reached. It resets shortly, please try again later.'
      : 'The AI is busy right now, give it a few seconds and try again.';
    messages.push({ role: 'assistant', content: friendly, _reveal: true });
  } finally {
    busy = false; _save(); render();
    document.getElementById('ca-send').disabled = false;
    document.getElementById('ca-input').focus();
  }
}

document.getElementById('ca-title').innerHTML = `${ICON('sparkle','ico ico-lg')} <span>Career Coach</span>`;
document.getElementById('ca-send').innerHTML = ICON('arrowRight');
render();
(async () => {
  if (typeof loadCurrentUser === 'function') { await loadCurrentUser(); if (window.renderPlanPill) renderPlanPill(); }
  if (_isFreeUser()) _showPremiumGate();
})();
</script>
