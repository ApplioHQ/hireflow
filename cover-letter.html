<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Cover Letter Maker | Applio</title>
<link rel="icon" href="logo.ico">
<link rel="stylesheet" href="css/styles.css">
<script src="js/theme.js"></script>
<style>
  .cl-wrap { max-width: 1120px; margin: 0 auto; padding: 28px 20px 80px; }
  .cl-head h1 { font-size: clamp(24px, 4vw, 32px); font-weight: 800; letter-spacing: -.5px; display:flex; align-items:center; gap:10px; }
  .cl-head p { color: var(--muted); font-size: 14px; margin-top: 6px; }
  .cl-grid { display: grid; grid-template-columns: 400px 1fr; gap: 20px; margin-top: 22px; align-items: start; }
  @media (max-width: 860px) { .cl-grid { grid-template-columns: 1fr; } }
  .cl-form label { display:block; font-size: 12.5px; font-weight: 600; margin: 14px 0 6px; }
  .cl-form label:first-of-type { margin-top: 0; }
  .cl-form input, .cl-form textarea { width:100%; box-sizing:border-box; padding: 10px 12px; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); font-size: 14px; font-family: inherit; transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
  .cl-form input:focus, .cl-form textarea:focus { outline: none; border-color: var(--accent); box-shadow: var(--ring); }
  .cl-form textarea { resize: vertical; line-height: 1.55; }
  .cl-tones { display:flex; flex-wrap:wrap; gap: 8px; }
  .cl-tone { font-size: 12.5px; padding: 7px 13px; border-radius: var(--r-full); border: 1px solid var(--border); background: var(--bg-2); color: var(--text); cursor: pointer; transition: all var(--dur) var(--ease); }
  .cl-tone:hover { border-color: var(--accent); }
  .cl-tone.active { border-color: transparent; color: #fff; background: var(--gradient); box-shadow: var(--sh-1); }
  .cl-gen { width:100%; margin-top: 18px; }
  /* Output "letter paper" */
  .cl-out-card { min-height: 520px; display:flex; flex-direction: column; }
  .cl-out-head { display:flex; align-items:center; justify-content: space-between; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .cl-out-head h3 { font-size: 15px; font-weight: 700; }
  .cl-out-actions { display:flex; gap: 8px; flex-wrap: wrap; }
  .cl-paper {
    flex: 1; background: #fbfbfd; color: #1a1a24; border-radius: var(--r-md);
    padding: 40px 44px; font-family: Georgia, 'Times New Roman', serif; font-size: 15px; line-height: 1.75;
    white-space: pre-wrap; box-shadow: inset 0 0 0 1px rgba(0,0,0,.06); overflow:auto;
    outline: none;
  }
  .cl-paper:focus { box-shadow: inset 0 0 0 2px var(--accent); }
  .cl-empty { flex:1; display:flex; flex-direction: column; align-items:center; justify-content: center; text-align:center; color: var(--muted); padding: 40px; }
  .cl-empty svg { width: 46px; height: 46px; color: var(--accent); margin-bottom: 14px; opacity:.9; }
  .cl-empty h4 { color: var(--text); font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .cl-empty p { font-size: 13.5px; max-width: 340px; line-height: 1.6; }
  .cl-steps { display: flex; flex-direction: column; gap: 12px; margin-top: 26px; text-align: left; max-width: 320px; width: 100%; }
  .cl-step { display: flex; gap: 11px; align-items: flex-start; }
  .cl-step-n { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: rgba(99,102,241,.16); border: 1px solid rgba(99,102,241,.3); color: var(--accent); font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
  .cl-step-t { font-size: 13px; font-weight: 650; color: var(--text); }
  .cl-step-d { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 2px; }
  /* Generating / "writing" animation, letter paper with paragraph lines */
  .cl-writing { flex:1; background:#fbfbfd; border-radius: var(--r-md); padding: 38px 44px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.06); display:flex; flex-direction:column; }
  .cl-writing-status { display:flex; align-items:center; gap:9px; color:#5b5bd6; font-size:13px; font-weight:600; margin-bottom:24px; }
  .cl-writing-spark { width:16px; height:16px; animation: clPulse 1.3s ease-in-out infinite; }
  @keyframes clPulse { 0%,100%{ transform:scale(1); opacity:1;} 50%{ transform:scale(.82); opacity:.55;} }
  .cl-dots span { display:inline-block; width:4px; height:4px; margin:0 1px; border-radius:50%; background:#8a8ad6; animation: clBlink 1.2s infinite both; }
  .cl-dots span:nth-child(2){ animation-delay:.18s; } .cl-dots span:nth-child(3){ animation-delay:.36s; }
  @keyframes clBlink { 0%,80%,100%{opacity:.3;} 40%{opacity:1;} }
  .cl-line { height:11px; border-radius:6px; margin-bottom:13px; opacity:0;
    background:linear-gradient(100deg,#e7e9f1 28%,#f3f4f9 50%,#e7e9f1 72%); background-size:200% 100%;
    animation: clShimmer 1.25s linear infinite, clReveal .45s ease forwards; }
  .cl-line.gap { margin-bottom:26px; }
  @keyframes clShimmer { to { background-position:-200% 0; } }
  @keyframes clReveal { from { opacity:0; transform:translateY(4px);} to { opacity:1; transform:none;} }
  @media (prefers-reduced-motion: reduce) { .cl-line { opacity:1; animation:none; } .cl-writing-spark { animation:none; } }
  /* Premium gate */
  .cl-gate { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding: 44px 30px; }
  .cl-gate .badge { font-size: 11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color: var(--accent); background: rgba(99,102,241,.14); border:1px solid rgba(99,102,241,.3); border-radius: var(--r-full); padding: 5px 12px; margin-bottom: 16px; }
  .cl-gate h4 { font-size: 19px; font-weight: 800; margin-bottom: 8px; }
  .cl-gate p { color: var(--muted); font-size: 14px; max-width: 380px; line-height:1.6; margin-bottom: 18px; }
</style>
</head>
<body class="app-body-scroll">
<header class="app-topbar">
  <div class="brand"><img src="logo.jpeg" width="32" height="32" class="brand-logo" alt="Applio"><span>Applio</span></div>
  <nav class="topbar-tabs">
    <a class="topbar-tab" href="dashboard">Home</a>
    <a class="topbar-tab" href="autopilot">Autopilot</a>
    <a class="topbar-tab" href="editor">Resume Builder</a>
    <a class="topbar-tab" href="jobs">Job Tracker</a>
    <a class="topbar-tab" href="interview">Interview Prep</a>
    <a class="topbar-tab" href="match">Best Match</a>
    <a class="topbar-tab active" href="cover-letter">Cover Letter</a>
    <a class="topbar-tab" href="assistant">Career Coach</a>
  </nav>
  <div class="topbar-right">
    <span id="health-badge"></span>
    <span id="plan-pill"></span>
    <button class="theme-toggle" onclick="toggleTheme()">☀️ Light</button>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign out</button>
  </div>
</header>

<main class="cl-wrap">
  <div class="cl-head">
    <h1 id="cl-title"></h1>
    <p>Generate a tailored, ready-to-send cover letter from your resume and the job you're applying to.</p>
    <p class="cl-free" id="cl-free" style="display:none; font-size:12.5px; color:var(--muted); margin-top:8px;"></p>
  </div>

  <div class="cl-grid">
    <!-- Form -->
    <div class="section-card cl-form">
      <label>Company</label>
      <input id="cl-company" placeholder="e.g. Stripe">
      <label>Role / Title</label>
      <input id="cl-role" placeholder="e.g. Product Manager">
      <label>Job description <span style="color:var(--muted);font-weight:400;">(optional, improves tailoring)</span></label>
      <textarea id="cl-jd" rows="6" placeholder="Paste the job posting here…"></textarea>
      <label>Anything to emphasize? <span style="color:var(--muted);font-weight:400;">(optional)</span></label>
      <input id="cl-highlights" placeholder="e.g. my fintech experience and team leadership">
      <label>Tone</label>
      <div class="cl-tones" id="cl-tones">
        <button type="button" class="cl-tone active" data-tone="professional">Professional</button>
        <button type="button" class="cl-tone" data-tone="enthusiastic">Enthusiastic</button>
        <button type="button" class="cl-tone" data-tone="confident">Confident</button>
        <button type="button" class="cl-tone" data-tone="warm">Warm</button>
      </div>
      <button class="btn btn-primary cl-gen" id="cl-gen"></button>
    </div>

    <!-- Output -->
    <div class="section-card cl-out-card" id="cl-out">
      <div class="cl-out-head">
        <h3>Your cover letter</h3>
        <div class="cl-out-actions" id="cl-actions" style="display:none;">
          <button class="btn btn-secondary btn-sm" id="cl-copy"></button>
          <button class="btn btn-secondary btn-sm" id="cl-download"></button>
          <button class="btn btn-ghost btn-sm" id="cl-regen"></button>
        </div>
      </div>
      <div id="cl-body"></div>
    </div>
  </div>
</main>

<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/notify.js"></script>
<script src="js/plan.js"></script>
<script src="js/health-badge.js"></script>
<script>
const API = window.HIREFLOW_CONFIG.API_URL;
const TOKEN = localStorage.getItem('hf_token');
const IS_ANON = !TOKEN; if (IS_ANON) window.addEventListener('load', initAnonTopbar);
let tone = 'professional';
let lastLetter = '';
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function signOut(){ localStorage.removeItem('hf_token'); location.href='/'; }
function _resume(){ try { return JSON.parse(localStorage.getItem('hf_resume') || '{}') || {}; } catch { return {}; } }

function _emptyState(){
  document.getElementById('cl-actions').style.display = 'none';
  var steps = [
    ['Grounded in your resume', 'Pulls real achievements and skills, never invents them.'],
    ['Matched to the job', 'Mirrors the role and job description in your chosen tone.'],
    ['Ready to send', 'Edit inline, then copy or download, done in seconds.'],
  ];
  document.getElementById('cl-body').innerHTML =
    '<div class="cl-empty">'
    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>'
    + '<h4>Ready when you are</h4>'
    + '<p>Add the company and role on the left, pick a tone, and generate a cover letter tailored to your resume.</p>'
    + '<div class="cl-steps">'
    +   steps.map(function(s, i){ return '<div class="cl-step"><span class="cl-step-n">' + (i+1) + '</span><div><div class="cl-step-t">' + s[0] + '</div><div class="cl-step-d">' + s[1] + '</div></div></div>'; }).join('')
    + '</div>'
    + '</div>';
}

function _gate(){
  document.getElementById('cl-actions').style.display = 'none';
  document.getElementById('cl-body').innerHTML =
    '<div class="cl-gate">'
    + '<span class="badge">Free letters used</span>'
    + '<h4>Unlock unlimited cover letters</h4>'
    + '<p>You\'ve used your free cover letters. Upgrade to Premium or Lifetime for unlimited tailored letters, grounded in your resume.</p>'
    + '<a class="btn btn-primary" href="pricing">' + ICON('sparkle','ico ico-sm') + ' See plans</a>'
    + '</div>';
  _showFreeRemaining(0);
}

// Free-tier taste: show how many free cover letters remain (paid = hidden).
function _showFreeRemaining(n){
  const el = document.getElementById('cl-free');
  if (!el) return;
  if (typeof n !== 'number' || (typeof isPaid === 'function' && isPaid())) { el.style.display = 'none'; return; }
  el.style.display = '';
  el.innerHTML = n > 0
    ? `${n} free cover letter${n === 1 ? '' : 's'} left. <a href="pricing" style="color:var(--accent);font-weight:600;">Go unlimited →</a>`
    : `That was your last free cover letter. <a href="pricing" style="color:var(--accent);font-weight:600;">Upgrade to keep going →</a>`;
}

function _writingState(){
  // Paragraph line widths (%) with blank-line gaps between "paragraphs".
  var groups = [[62], [96,92,88,70], [94,90,97,64], [90,84,40]];
  var i = 0, lines = '';
  groups.forEach(function(g){
    g.forEach(function(w, idx){
      var gap = idx === g.length - 1 ? ' gap' : '';
      lines += '<div class="cl-line' + gap + '" style="width:' + w + '%;animation-delay:0s,' + (i * 0.09).toFixed(2) + 's"></div>';
      i++;
    });
  });
  return '<div class="cl-writing">'
    + '<div class="cl-writing-status">'
    +   '<svg class="cl-writing-spark" viewBox="0 0 24 24" fill="none" stroke="#5b5bd6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/></svg>'
    +   '<span>Writing your cover letter</span>'
    +   '<span class="cl-dots"><span></span><span></span><span></span></span>'
    + '</div>'
    + lines
    + '</div>';
}

function _renderLetter(text){
  lastLetter = text;
  document.getElementById('cl-actions').style.display = 'flex';
  document.getElementById('cl-body').innerHTML =
    '<div class="cl-paper" id="cl-paper" contenteditable="true" spellcheck="true">' + esc(text) + '</div>';
}

async function generate(){
  if (IS_ANON) { promptSignup('generate your tailored cover letter'); return; }
  const company = document.getElementById('cl-company').value.trim();
  const role = document.getElementById('cl-role').value.trim();
  const jd = document.getElementById('cl-jd').value.trim();
  const highlights = document.getElementById('cl-highlights').value.trim();
  if (!role && !company) { toast('Add a company or role first', {type:'warn'}); return; }

  document.getElementById('cl-actions').style.display = 'none';
  document.getElementById('cl-body').innerHTML = _writingState();

  try {
    const r = await fetch(API + '/ai/cover-letter', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
      body: JSON.stringify({ role, company, jobDescription: jd, tone, highlights, resume: _resume() })
    });
    if (r.status === 402) { _gate(); return; }
    if (!r.ok) throw new Error('AI failed');
    const data = await r.json();
    const text = (data.text || '').trim();
    if (!text) throw new Error('empty');
    _renderLetter(text);
    if (typeof data.freeRemaining === 'number') _showFreeRemaining(data.freeRemaining);
  } catch(e){
    document.getElementById('cl-body').innerHTML =
      '<div class="cl-empty" style="color:var(--danger);"><h4 style="color:var(--danger);">Something went wrong</h4><p>We couldn\'t generate that cover letter. Please try again.</p></div>';
  }
}

document.getElementById('cl-tones').addEventListener('click', function(e){
  const b = e.target.closest('.cl-tone'); if (!b) return;
  tone = b.getAttribute('data-tone');
  document.querySelectorAll('.cl-tone').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
});

document.addEventListener('click', function(e){
  if (e.target.closest('#cl-gen')) generate();
  if (e.target.closest('#cl-regen')) generate();
  if (e.target.closest('#cl-copy')) {
    const el = document.getElementById('cl-paper');
    const txt = el ? el.innerText : lastLetter;
    navigator.clipboard.writeText(txt).then(()=>toast('Copied to clipboard', {type:'success'}));
  }
  if (e.target.closest('#cl-download')) {
    const el = document.getElementById('cl-paper');
    const txt = el ? el.innerText : lastLetter;
    const company = (document.getElementById('cl-company').value.trim() || 'company').replace(/[^a-z0-9]+/gi,'-').toLowerCase();
    const blob = new Blob([txt], {type:'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'cover-letter-' + company + '.txt';
    document.body.appendChild(a); a.click(); a.remove();
  }
});

(async () => {
  await loadCurrentUser();
  document.getElementById('cl-title').innerHTML = ICON('doc') + ' <span>Cover Letter Maker</span>';
  document.getElementById('cl-gen').innerHTML = ICON('sparkle') + ' <span>Generate cover letter</span>';
  document.getElementById('cl-copy').innerHTML = ICON('check','ico ico-sm') + ' <span>Copy</span>';
  document.getElementById('cl-download').innerHTML = ICON('download','ico ico-sm') + ' <span>Download</span>';
  document.getElementById('cl-regen').innerHTML = ICON('bolt','ico ico-sm') + ' <span>Regenerate</span>';
  const planPill = document.getElementById('plan-pill');
  if (isPaid()) planPill.innerHTML = `<button class="pill success" onclick="openBillingPortal()" style="cursor:pointer;">${ICON('crown','ico ico-sm')} ${planLabel()}</button>`;
  else planPill.innerHTML = `<a class="btn btn-primary btn-xs" href="pricing">${ICON('sparkle','ico ico-sm')} <span>Upgrade</span></a>`;
  // Free users: show how many free cover letters remain (2 total).
  if (!isPaid()) {
    const used = (typeof CURRENT_USER !== 'undefined' && CURRENT_USER && CURRENT_USER.coverLettersUsed) || 0;
    _showFreeRemaining(Math.max(0, 2 - used));
  }
  _emptyState();
})();
</script>
  <script src="js/appnav.js"></script>
  <script src="js/acctcenter.js"></script>
<script src="/js/appshell.js"></script>
</body>
</html>
