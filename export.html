<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Export, Applio</title>
<link rel="icon" href="logo.ico">
<link rel="stylesheet" href="css/styles.css">
<script src="js/theme.js"></script>
<style>
  .export-grid { display:grid; grid-template-columns: 1fr 320px; gap:24px; padding:24px; max-width:1240px; margin:0 auto; }
  /* resume-page replaced by export-preview-container in styles.css */
  @media print {
    body, .app-body-scroll { background: #fff !important; }
    .app-topbar, .export-side { display:none !important; }
    .export-grid { display:block; padding:0; max-width:none; }
    .resume-page { box-shadow:none; aspect-ratio:auto; border-radius:0; }
  }
</style>
</head>
<body class="app-body-scroll">
<header class="app-topbar">
  <div class="brand"><img src="logo.jpeg" class="brand-logo" alt="Applio"><span>Applio</span></div>
  <nav class="topbar-tabs">
    <a class="topbar-tab" href="editor.html" id="back-link"></a>
  </nav>
  <div class="topbar-right">
    <span id="download-pill"></span>
    <span id="plan-pill"></span>
    <button class="theme-toggle" onclick="toggleTheme()">☀️ Light</button>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign out</button>
  </div>
</header>

<div class="export-grid">
  <div id="resume-preview" class="export-preview-container"></div>

  <aside class="export-side">
    <div class="section-card">
      <h3 style="margin-bottom:14px;" id="es-title"></h3>
      <div class="form-field">
        <label>File Format</label>
        <div style="display:grid; grid-template-columns: repeat(3,1fr); gap:6px;">
          <button class="btn btn-primary btn-sm" onclick="tryExport('pdf')">PDF</button>
          <button class="btn btn-secondary btn-sm" onclick="tryExport('html')">HTML</button>
          <button class="btn btn-ghost btn-sm" onclick="tryExport('txt')">TXT</button>
        </div>
      </div>
      <div class="form-field">
        <label>Page Size</label>
        <select id="page-size" onchange="updatePageSize()">
          <option value="letter">US Letter (8.5×11)</option>
          <option value="a4">A4</option>
        </select>
      </div>
      <div class="form-field">
        <label>Margins</label>
        <select id="margins" onchange="render()">
          <option>Normal</option><option>Narrow</option><option>Wide</option>
        </select>
      </div>
      <button class="btn btn-primary btn-block" onclick="tryExport('pdf')" id="btn-pdf"></button>
      <button class="btn btn-secondary btn-block" style="margin-top:8px;" onclick="tryExport('pdf')">Print</button>
      <div id="download-info" style="margin-top:14px; font-size:12px; color:var(--muted); text-align:center;"></div>
    </div>
  </aside>
</div>

<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/notify.js"></script>
<script src="js/plan.js"></script>
<script src="js/templates.js"></script>
<script>
const TOKEN = localStorage.getItem('hf_token');
if (!TOKEN) location.href = 'login.html';
const resume = (function () {
  try { return JSON.parse(localStorage.getItem('hf_resume') || '{}'); }
  catch { return {}; }  // corrupt storage must not white-screen the export page
})();

let _exportFrame = null;
function render() {
  const marginsKey = document.getElementById('margins')?.value || 'Normal';
  const pageSize = document.getElementById('page-size')?.value || 'letter';
  const pageWidth = pageSize === 'a4' ? 794 : 816;
  const html = renderTemplate(resume.template || 'modern', resume, false, resume.customize?.accent, marginsKey);
  const container = document.getElementById('resume-preview');
  container.style.maxWidth = pageWidth + 'px';
  if (!_exportFrame) {
    _exportFrame = document.createElement('iframe');
    _exportFrame.id = 'resume-frame';
    _exportFrame.title = 'Resume preview';
    _exportFrame.style.cssText = 'width:100%; border:0; background:#fff; display:block;';
    container.innerHTML = '';
    container.appendChild(_exportFrame);
  }
  const doc = writeResumeFrame(_exportFrame, html, pageWidth);
  // Name the print document so "Save as PDF" defaults to the candidate's name.
  try { doc.title = _resumeFilename(''); } catch (_) {}
  // Auto-size the iframe height to its content.
  const fit = () => { _exportFrame.style.height = (doc.documentElement.scrollHeight) + 'px'; };
  fit();
  setTimeout(fit, 60);
}
function printFrame() {
  if (_exportFrame && _exportFrame.contentWindow) _exportFrame.contentWindow.print();
  else window.print();
}

async function tryExport(fmt) {
  // Free users have a download limit. Premium/Lifetime: unlimited.
  if (isFree()) {
    if (downloadsLeft() <= 0) { showUpgradeModal('downloads'); return; }
    // Increment server-side
    try {
      const r = await fetch(window.HIREFLOW_CONFIG.API_URL + '/downloads/increment', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + TOKEN }
      });
      const data = await r.json();
      if (!data.allowed) { showUpgradeModal('downloads'); return; }
      CURRENT_USER.downloadsUsed = data.downloadsUsed;
      updatePills();
    } catch(e) { console.warn('download tracking failed', e); }
  }
  if (fmt === 'pdf') printFrame();
  else if (fmt === 'html') exportHTML();
  else if (fmt === 'txt') exportTXT();
  // Non-blocking feedback prompt shortly after the download completes.
  setTimeout(showExportFeedbackPrompt, 1500);
}

// ============ Post-export feedback prompt (Feature 1) ============
let _fbPrompt = null, _fbTimer = null;
function showExportFeedbackPrompt() {
  if (_fbPrompt) return; // only one at a time
  const el = document.createElement('div');
  _fbPrompt = el;
  el.style.cssText = [
    'position:fixed','right:20px','bottom:20px','z-index:9998',
    'width:300px','max-width:calc(100vw - 40px)',
    'background:var(--bg-1)','color:var(--text)',
    'border:1px solid var(--border)','border-radius:12px',
    'box-shadow:0 10px 30px rgba(0,0,0,.45)','padding:16px','font-size:13px',
    'opacity:0','transform:translateY(16px)',
    'transition:opacity .25s ease, transform .25s ease'
  ].join(';');

  function armAutoDismiss() { clearTimeout(_fbTimer); _fbTimer = setTimeout(dismiss, 15000); }
  function dismiss() {
    clearTimeout(_fbTimer);
    el.style.opacity = '0'; el.style.transform = 'translateY(16px)';
    setTimeout(() => { el.remove(); if (_fbPrompt === el) _fbPrompt = null; }, 250);
  }
  const closeBtn = '<button data-fb-close="1" aria-label="Dismiss" title="Dismiss" style="position:absolute;top:6px;right:8px;background:none;border:none;color:var(--muted);font-size:16px;line-height:1;cursor:pointer;">×</button>';

  function renderAsk() {
    el.innerHTML = '<div style="position:relative;">' + closeBtn +
      '<div style="font-weight:600;margin-bottom:12px;padding-right:18px;">How was your experience?</div>' +
      '<div style="display:flex;gap:8px;">' +
        '<button data-fb="up" style="flex:1;cursor:pointer;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:20px;line-height:1;">👍</button>' +
        '<button data-fb="down" style="flex:1;cursor:pointer;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:20px;line-height:1;">👎</button>' +
      '</div></div>';
    el.querySelector('[data-fb-close]').onclick = dismiss;
    el.querySelector('[data-fb="up"]').onclick = () => {
      sendFeedback({ rating: 'up', message: '', context: 'export', page: 'export' });
      thanks();
    };
    el.querySelector('[data-fb="down"]').onclick = renderDown;
  }
  function renderDown() {
    armAutoDismiss();
    el.innerHTML = '<div style="position:relative;">' + closeBtn +
      '<div style="font-weight:600;margin-bottom:10px;padding-right:18px;">What went wrong?</div>' +
      '<textarea id="fb-down-msg" rows="3" placeholder="Tell us what could be better…" ' +
        'style="width:100%;box-sizing:border-box;padding:8px 10px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;resize:vertical;"></textarea>' +
      '<button id="fb-down-submit" class="btn btn-primary btn-sm btn-block" style="margin-top:8px;">Submit</button></div>';
    el.querySelector('[data-fb-close]').onclick = dismiss;
    const ta = el.querySelector('#fb-down-msg');
    if (ta) { ta.focus(); ta.oninput = armAutoDismiss; }
    el.querySelector('#fb-down-submit').onclick = () => {
      sendFeedback({ rating: 'down', message: ta ? ta.value.trim() : '', context: 'export', page: 'export' });
      thanks();
    };
  }
  function thanks() {
    clearTimeout(_fbTimer);
    el.innerHTML = '<div style="text-align:center;font-weight:600;padding:6px 0;">Thanks! 🙌</div>';
    setTimeout(dismiss, 2000);
  }

  renderAsk();
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; });
  armAutoDismiss();
}

function updatePageSize() {
  // Re-render: the iframe rebuilds at the correct page width.
  render();
}

// "Jordan_Rivera_Resume.pdf" from the candidate's name (falls back to "resume").
function _resumeFilename(ext) {
  const name = ((resume.personal && resume.personal.fullName) || '').trim()
    .replace(/\s+/g, '_').replace(/[^\w-]/g, '');
  const base = name ? name + '_Resume' : 'resume';
  return ext ? base + '.' + ext : base;
}
function exportHTML() {
  const doc = _exportFrame && _exportFrame.contentDocument;
  const html = doc ? '<!DOCTYPE html>' + doc.documentElement.outerHTML
                   : renderTemplate(resume.template || 'modern', resume, false, resume.customize?.accent);
  const blob = new Blob([html], {type:'text/html'});
  download(blob, _resumeFilename('html'));
}
function exportTXT() {
  const doc = _exportFrame && _exportFrame.contentDocument;
  const txt = doc ? doc.body.innerText : '';
  download(new Blob([txt], {type:'text/plain'}), _resumeFilename('txt'));
}
function download(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}
function signOut(){ localStorage.removeItem('hf_token'); location.href='index.html'; }


function updatePills() {
  const planPill = document.getElementById('plan-pill');
  const dlPill = document.getElementById('download-pill');
  const info = document.getElementById('download-info');
  if (isPaid()) {
    planPill.innerHTML = `<button class="pill success" onclick="openBillingPortal()" style="cursor:pointer;">${ICON('crown','ico ico-sm')} ${planLabel()}</button>`;
    dlPill.style.display = 'none';
    info.textContent = 'Unlimited downloads on your plan';
  } else {
    planPill.innerHTML = `<a class="btn btn-primary btn-xs" href="pricing.html">${ICON('sparkle','ico ico-sm')} <span>Upgrade</span></a>`;
    const left = downloadsLeft();
    const used = CURRENT_USER?.downloadsUsed || 0;
    const lim = CURRENT_USER?.downloadLimit || 10;
    dlPill.style.display = '';
    dlPill.innerHTML = `<span class="pill" style="background:var(--bg-2);color:var(--muted);border:1px solid var(--border);">${ICON('download','ico ico-sm')} ${used} of ${lim} free downloads used</span>`;
    info.innerHTML = `${left} of ${lim} downloads left this month on Free plan. <a href="pricing.html" style="color:var(--accent);">Go unlimited →</a>`;
  }
}

(async () => {
  document.getElementById('back-link').innerHTML = `${ICON('arrowLeft')} <span>Back to Editor</span>`;
  document.getElementById('es-title').innerHTML = `${ICON('settings')} <span style="margin-left:6px;">Export Settings</span>`;
  document.getElementById('btn-pdf').innerHTML = `${ICON('download')} <span>Download PDF</span>`;
  render();
  await loadCurrentUser();
  updatePills();
})();
</script>
</body>
</html>
