  .export-grid { display:grid; grid-template-columns: 1fr 320px; gap:24px; padding:24px; max-width:1240px; margin:0 auto; }
  /* File-format segmented control */
  .fmt-seg { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; background:var(--bg-2); border:1px solid var(--border); border-radius:12px; padding:4px; }
  .fmt-opt { display:flex; flex-direction:column; align-items:center; gap:6px; padding:11px 6px; border:0; background:transparent; color:var(--muted); border-radius:9px; cursor:pointer; font-size:12.5px; font-weight:700; letter-spacing:.02em; transition:background .15s, color .15s, box-shadow .15s, transform .1s; }

  @media print {
    body, .app-body-scroll { background: #fff !important; }
    .app-topbar, .export-side { display:none !important; }
    .export-grid { display:block; padding:0; max-width:none; }
    .resume-page { box-shadow:none; aspect-ratio:auto; border-radius:0; }
  }

            <span>HTML</span>
          </button>
          <button type="button" class="fmt-opt" data-fmt="txt" role="radio" aria-checked="false" onclick="selectFormat('txt')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/><line x1="8" y1="13" x2="15" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>

          </button>

<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/notify.js"></script>

<script>
const TOKEN = localStorage.getItem('hf_token');
if (!TOKEN) location.href = 'login';
const resume = (function () {
  try { return JSON.parse(localStorage.getItem('hf_resume') || '{}'); }
  catch { return {}; }  // corrupt storage must not white-screen the export page
})();

let _exportFrame = null;

// ===== Google-Docs-style paginated preview =====
// The preview shows the résumé as discrete white page sheets on a gray canvas.
// The SAME iframe is the print/export source, so anything that produces a file
// (PDF print, HTML, TXT) first re-renders it CLEAN via _renderClean(), so the
// output never contains the canvas/sheets/page-number chrome.
const EXP_PAD = 40, EXP_GAP = 24, EXP_MAX = 16;
function _expPageW() { return (document.getElementById('page-size')?.value === 'a4') ? 794 : 816; }
function _expPageH() { return (document.getElementById('page-size')?.value === 'a4') ? 1123 : 1056; }
function _expContentEls(body) { return Array.from(body.children).filter(el => el.tagName !== 'STYLE' && !el.classList.contains('hf-sheet')); }
function _expFlowRoot(root) {
  const n = root.querySelector('.body'); if (n) return n;
  let best = root.firstElementChild || root, bn = best.children ? best.children.length : 0;
  root.querySelectorAll('div, section, main').forEach(el => { if (el.children.length > bn) { best = el; bn = el.children.length; } });
  return best;
}
function _expBreakUnits(root, pageH) {
  const units = [];
  for (const c of Array.from(root.children)) {
    if (c.classList && c.classList.contains('hf-pagebreak')) continue;
    const kids = c.children ? Array.from(c.children) : [];
    if (c.getBoundingClientRect().height > pageH && kids.length > 1) kids.forEach(k => units.push(k));
    else units.push(c);
  }
  return units;
}
// True if a break-unit is a section heading we shouldn't strand at a page bottom.
function _expIsHeading(el) {
  if (/^H[1-4]$/.test(el.tagName)) return true;
  const t = (el.textContent || '').trim();
  return !!(el.querySelector && el.querySelector('h1,h2,h3,h4')) && t.length > 0 && t.length < 60;
}
// Decide which units start a new page, on CONTINUOUS (un-paginated) coordinates,
// so the identical result drives both the on-screen preview and the printed PDF
// (true WYSIWYG). Widow control: a heading is never left alone at a page bottom,
// it moves to the next page with its content.
function _expComputeBreaks(measured, pageH) {
  const set = new Set();
  let pageStartY = 0;
  for (let i = 0; i < measured.length; i++) {
    if (set.size >= EXP_MAX - 1) break;
    const m = measured[i];
    if (m.top - pageStartY < 1) continue;             // first unit on the page
    if (m.top + m.h - pageStartY > pageH) {            // overflows this page
      let b = m;
      const prev = measured[i - 1];                    // keep a heading with its block
      if (prev && _expIsHeading(prev.el) && prev.top - pageStartY > 1) b = prev;
      set.add(b.el);
      pageStartY = b.top;
    }
  }
  return set;
}
// Measure each break-unit's continuous position relative to `ref`'s top.
function _expMeasure(units, ref) {
  const base = ref.getBoundingClientRect().top;
  return units.map(u => { const r = u.getBoundingClientRect(); return { el: u, top: r.top - base, h: r.height }; });
}
function _expPaginate(doc) {
  const body = doc.body, pageW = _expPageW(), pageH = _expPageH(), canvasW = pageW + EXP_PAD * 2;
  doc.querySelectorAll('.hf-sheet, .hf-pagebreak').forEach(e => e.remove());
  const prev = Array.from(body.children).find(el => el.classList && el.classList.contains('hf-doc'));
  if (prev) { while (prev.firstChild) body.insertBefore(prev.firstChild, prev); prev.remove(); }
  const col = doc.createElement('div');
  col.className = 'hf-doc';
  col.style.cssText = 'position:relative; width:' + pageW + 'px; margin:0 auto;';
  _expContentEls(body).forEach(el => col.appendChild(el));
  body.appendChild(col);
  body.style.background = '#e9eaef'; body.style.width = canvasW + 'px'; body.style.padding = EXP_PAD + 'px 0'; body.style.margin = '0';
  const flow = _expFlowRoot(col), units = _expBreakUnits(flow, pageH), step = pageH + EXP_GAP;
  // Measure ONCE on continuous coords, then compute the break set (same as print).
  const measured = _expMeasure(units, col);
  const breaks = _expComputeBreaks(measured, pageH);
  // Push each break unit to the top of its sheet with a spacer.
  let accGap = 0, k = 0;
  for (const m of measured) {
    if (!breaks.has(m.el)) continue;
    const target = (k + 1) * step;
    const spH = Math.max(0, Math.round(target - (m.top + accGap)));
    const sp = doc.createElement('div'); sp.className = 'hf-pagebreak';
    sp.style.cssText = 'height:' + spH + 'px;';
    (m.el.parentNode || flow).insertBefore(sp, m.el);
    accGap += spH; k++;
  }
  const total = k + 1;
  Array.from(col.children).forEach(el => {
    if (el.classList.contains('hf-pagebreak')) return;
    if (doc.defaultView.getComputedStyle(el).position === 'static') el.style.position = 'relative';
    el.style.zIndex = '1';
  });
  for (let i = 0; i < total; i++) {
    const s = doc.createElement('div'); s.className = 'hf-sheet';
    s.style.cssText = 'position:absolute; left:0; right:0; top:' + (i * step) + 'px; height:' + pageH +
      'px; background:#fff; z-index:0; border-radius:2px; box-shadow:0 0 0 1px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.16),0 10px 24px rgba(0,0,0,.10);';
    col.appendChild(s);
    const num = doc.createElement('div'); num.className = 'hf-sheet';
    num.textContent = 'Page ' + (i + 1) + ' of ' + total;
    num.style.cssText = 'position:absolute; left:0; right:0; top:' + (i * step + pageH + 6) +
      'px; text-align:center; font:600 11px -apple-system,BlinkMacSystemFont,sans-serif; letter-spacing:.04em; color:#8a93a6; z-index:0;';
    col.appendChild(num);
  }
  col.style.minHeight = (total * pageH + total * EXP_GAP) + 'px';
}
function _expScale(doc) {
  const container = document.getElementById('resume-preview');
  const canvasW = _expPageW() + EXP_PAD * 2;
  const sizer = container.querySelector('.exp-sizer');
  const avail = container.clientWidth || canvasW;
  const s = Math.min(1, avail / canvasW);
  const h = doc.documentElement.scrollHeight;
  _exportFrame.style.width = canvasW + 'px';
  _exportFrame.style.height = h + 'px';
  _exportFrame.style.transform = 'scale(' + s + ')';
  if (sizer) { sizer.style.width = Math.round(canvasW * s) + 'px'; sizer.style.height = Math.round(h * s) + 'px'; }
}
// Clean, un-paginated render, used for the visible preview's base AND for any
// file output (print / HTML / TXT) so exports never include the canvas chrome.
function _renderClean() {
  const marginsKey = document.getElementById('margins')?.value || 'Normal';
  const html = renderTemplate(resume.template || 'modern', resume, false, resume.customize?.accent, marginsKey);
  const doc = writeResumeFrame(_exportFrame, html, _expPageW());
  try { doc.title = _resumeFilename(''); } catch (_) {}
  _exportFrame.style.transform = 'none';
  // "Fit to one page": compress font/spacing/margins to one sheet before we
  // compute breaks, so the exported PDF matches the editor's fit-to-one-page preview.
  if (resume.customize?.fitOnePage && typeof fitDocToOnePage === 'function') {
    try { fitDocToOnePage(doc, _expPageH()); } catch (_) {}
  }
  // WYSIWYG: force the PDF to break at the SAME units the preview shows, rather
  // than relying on the browser's native heuristics (which can disagree by a block
  // near a boundary). Résumé fonts are system fonts, so this fresh doc measures
  // accurately and synchronously, matching what _expPaginate computed.
  try {
    const pageH = _expPageH();
    const units = _expBreakUnits(_expFlowRoot(doc.body), pageH);
    _expComputeBreaks(_expMeasure(units, doc.body), pageH).forEach(el => {
      el.style.breakBefore = 'page';
      el.style.pageBreakBefore = 'always';
    });
  } catch (_) {}
  return doc;
}
function render() {
  const container = document.getElementById('resume-preview');
  container.style.maxWidth = (_expPageW() + EXP_PAD * 2) + 'px';
  container.style.background = '#e9eaef';
  if (!_exportFrame) {
    container.innerHTML = '';
    const sizer = document.createElement('div');
    sizer.className = 'exp-sizer';
    sizer.style.cssText = 'position:relative; margin:0 auto;';
    _exportFrame = document.createElement('iframe');
    _exportFrame.id = 'resume-frame';
    _exportFrame.title = 'Resume preview';
    _exportFrame.setAttribute('scrolling', 'no');
    _exportFrame.style.cssText = 'border:0; background:#fff; display:block; transform-origin:top left;';
    sizer.appendChild(_exportFrame);
    container.appendChild(sizer);
  }
  const doc = _renderClean();
  const apply = () => { _expPaginate(doc); _expScale(doc); };
  apply();
  setTimeout(apply, 60);
}
window.addEventListener('resize', () => {
  if (_exportFrame && _exportFrame.contentDocument && _exportFrame.contentDocument.querySelector('.hf-doc')) _expScale(_exportFrame.contentDocument);
});
function printFrame() {
  if (!(_exportFrame && _exportFrame.contentWindow)) { window.print(); return; }
  _renderClean();                       // strip the canvas/sheets so the PDF is clean
  _exportFrame.contentWindow.focus();
  _exportFrame.contentWindow.print();
  setTimeout(render, 400);              // restore the paginated preview afterward
}

async function tryExport(fmt) {
  // Free users have a download limit. Premium/Lifetime: unlimited.
  if (isFree()) {
    if (downloadsLeft() <= 0) { showUpgradeModal('downloads'); return; }
    // Increment server-side
    try {
      const r = await fetch(window.HIREFLOW_CONFIG.API_URL + '/downloads/increment', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + TOKEN }
      });
      const data = await r.json();
      if (!data.allowed) { showUpgradeModal('downloads'); return; }
      CURRENT_USER.downloadsUsed = data.downloadsUsed;
      updatePills();
    } catch(e) { console.warn('download tracking failed', e); }
  }
  if (fmt === 'pdf') printFrame();
  else if (fmt === 'html') exportHTML();
  else if (fmt === 'txt') exportTXT();
  // Non-blocking feedback prompt shortly after the download completes.
  setTimeout(showExportFeedbackPrompt, 1500);
}

// ============ Post-export feedback prompt (Feature 1) ============
let _fbPrompt = null, _fbTimer = null;
function showExportFeedbackPrompt() {
  if (_fbPrompt) return; // only one at a time
  const el = document.createElement('div');
  _fbPrompt = el;
  el.style.cssText = [
    'position:fixed','right:20px','bottom:20px','z-index:9998',
    'width:300px','max-width:calc(100vw - 40px)',
    'background:var(--bg-1)','color:var(--text)',
    'border:1px solid var(--border)','border-radius:12px',
    'box-shadow:0 10px 30px rgba(0,0,0,.45)','padding:16px','font-size:13px',
    'opacity:0','transform:translateY(16px)',
    'transition:opacity .25s ease, transform .25s ease'
  ].join(';');

  function armAutoDismiss() { clearTimeout(_fbTimer); _fbTimer = setTimeout(dismiss, 15000); }
  function dismiss() {
    clearTimeout(_fbTimer);
    el.style.opacity = '0'; el.style.transform = 'translateY(16px)';
    setTimeout(() => { el.remove(); if (_fbPrompt === el) _fbPrompt = null; }, 250);
  }
  const closeBtn = '<button data-fb-close="1" aria-label="Dismiss" title="Dismiss" style="position:absolute;top:6px;right:8px;background:none;border:none;color:var(--muted);font-size:16px;line-height:1;cursor:pointer;">×</button>';

  function renderAsk() {
    el.innerHTML = '<div style="position:relative;">' + closeBtn +
      '<div style="font-weight:600;margin-bottom:12px;padding-right:18px;">How was your experience?</div>' +
      '<div style="display:flex;gap:8px;">' +
        '<button data-fb="up" style="flex:1;cursor:pointer;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:20px;line-height:1;">👍</button>' +
        '<button data-fb="down" style="flex:1;cursor:pointer;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:20px;line-height:1;">👎</button>' +
      '</div></div>';
    el.querySelector('[data-fb-close]').onclick = dismiss;
    el.querySelector('[data-fb="up"]').onclick = () => {
      sendFeedback({ rating: 'up', message: '', context: 'export', page: 'export' });
      thanks();
    };
    el.querySelector('[data-fb="down"]').onclick = renderDown;
  }
  function renderDown() {
    armAutoDismiss();
    el.innerHTML = '<div style="position:relative;">' + closeBtn +
      '<div style="font-weight:600;margin-bottom:10px;padding-right:18px;">What went wrong?</div>' +
      '<textarea id="fb-down-msg" rows="3" placeholder="Tell us what could be better…" ' +
        'style="width:100%;box-sizing:border-box;padding:8px 10px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;resize:vertical;"></textarea>' +
      '<button id="fb-down-submit" class="btn btn-primary btn-sm btn-block" style="margin-top:8px;">Submit</button></div>';
    el.querySelector('[data-fb-close]').onclick = dismiss;
    const ta = el.querySelector('#fb-down-msg');
    if (ta) { ta.focus(); ta.oninput = armAutoDismiss; }
    el.querySelector('#fb-down-submit').onclick = () => {
      sendFeedback({ rating: 'down', message: ta ? ta.value.trim() : '', context: 'export', page: 'export' });
      thanks();
    };
  }
  function thanks() {
    clearTimeout(_fbTimer);
    el.innerHTML = '<div style="text-align:center;font-weight:600;padding:6px 0;">Thanks! 🙌</div>';
    setTimeout(dismiss, 2000);
  }

  renderAsk();
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; });
  armAutoDismiss();
}

// File-format selection: pick a format up top, the big button downloads it.
let SELECTED_FORMAT = 'pdf';
const FMT_INFO = {
  pdf:  { label: 'Download PDF',  hint: 'Pixel-perfect and ready to send to recruiters.' },
  html: { label: 'Download HTML', hint: 'An editable web page you can open in any browser.' },
  txt:  { label: 'Download TXT',  hint: 'Plain text, ideal for pasting into ATS application forms.' },
};
function selectFormat(fmt) {
  if (!FMT_INFO[fmt]) return;
  SELECTED_FORMAT = fmt;
  document.querySelectorAll('#fmt-seg .fmt-opt').forEach(function (b) {
    const on = b.dataset.fmt === fmt;
    b.classList.toggle('active', on);
    b.setAttribute('aria-checked', on ? 'true' : 'false');
  });
  const hint = document.getElementById('fmt-hint');
  if (hint) hint.textContent = FMT_INFO[fmt].hint;
  const btn = document.getElementById('btn-pdf');
  if (btn) btn.innerHTML = `${ICON('download')} <span>${FMT_INFO[fmt].label}</span>`;
}

function updatePageSize() {
  // Re-render: the iframe rebuilds at the correct page width.
  render();
}

function toggleFitOnePage() {
  if (!resume.customize) resume.customize = {};
  resume.customize.fitOnePage = !!document.getElementById('fit-one-page').checked;
  try { localStorage.setItem('hf_resume', JSON.stringify(resume)); } catch (_) {}  // sync back to editor
  render();
}

// "Jordan_Rivera_Resume.pdf" from the candidate's name (falls back to "resume").
function _resumeFilename(ext) {
  const name = ((resume.personal && resume.personal.fullName) || '').trim()
    .replace(/\s+/g, '_').replace(/[^\w-]/g, '');
  const base = name ? name + '_Resume' : 'resume';
  return ext ? base + '.' + ext : base;
}
function exportHTML() {
  // Render clean first so the downloaded file has no canvas/sheet chrome.
  const doc = _exportFrame ? _renderClean() : null;
  const html = doc ? '<!DOCTYPE html>' + doc.documentElement.outerHTML
                   : renderTemplate(resume.template || 'modern', resume, false, resume.customize?.accent);
  download(new Blob([html], {type:'text/html'}), _resumeFilename('html'));
  if (_exportFrame) render();           // restore the paginated preview
}
function exportTXT() {
  const doc = _exportFrame ? _renderClean() : null;
  const txt = doc ? doc.body.innerText : '';
  download(new Blob([txt], {type:'text/plain'}), _resumeFilename('txt'));
  if (_exportFrame) render();
}
function download(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}
function signOut(){ localStorage.removeItem('hf_token'); location.href='/'; }

// Account dropdown (ported from the editor so export shares the same account center).
function toggleAcctMenu(e) {
  if (e) e.stopPropagation();
  const menu = document.getElementById('acct-menu');
  if (!menu) return;
  if (menu.hasAttribute('hidden')) {
    menu.removeAttribute('hidden');
    const t = document.getElementById('acct-trigger'); if (t) t.setAttribute('aria-expanded', 'true');
    document.getElementById('acct-center').classList.add('open');
  } else { closeAcctMenu(); }
}
function closeAcctMenu() {
  const menu = document.getElementById('acct-menu');
  if (!menu || menu.hasAttribute('hidden')) return;
  menu.setAttribute('hidden', '');
  const t = document.getElementById('acct-trigger'); if (t) t.setAttribute('aria-expanded', 'false');
  const c = document.getElementById('acct-center'); if (c) c.classList.remove('open');
}
document.addEventListener('click', function (e) {
  const c = document.getElementById('acct-center');
  if (c && !c.contains(e.target)) closeAcctMenu();
});
document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeAcctMenu(); });


function updatePills() {
  const planPill = document.getElementById('plan-pill');
  const dlPill = document.getElementById('download-pill');
  const info = document.getElementById('download-info');
  // Account center identity
  const acctEmail = (CURRENT_USER && CURRENT_USER.email) || localStorage.getItem('hf_email') || '';
  const initials = acctEmail ? acctEmail.trim().charAt(0).toUpperCase() : 'A';
  ['acct-avatar', 'acct-avatar-lg'].forEach(function (id) { const el = document.getElementById(id); if (el) el.textContent = initials; });
  const emEl = document.getElementById('acct-email'); if (emEl) emEl.textContent = acctEmail || 'Account';
  const _admin = (typeof isAdmin === 'function' && isAdmin());
  const plEl = document.getElementById('acct-plan-label'); if (plEl) plEl.textContent = _admin ? 'Admin · full access' : (isPaid() ? (planLabel() + ' plan') : 'Free plan');
  const mgRow = document.getElementById('acct-manage-sub'); if (mgRow) mgRow.style.display = (isPaid() && !_admin) ? '' : 'none';
  const adRow = document.getElementById('acct-admin-console'); if (adRow) adRow.style.display = _admin ? '' : 'none';
  if (_admin) {
    planPill.innerHTML = `<span class="pill success" title="Admin — full access">${ICON('crown','ico ico-sm')} Admin</span>`;
    dlPill.style.display = 'none';
    info.textContent = 'Admin — unlimited downloads';
  } else if (isPaid()) {
    planPill.innerHTML = `<button class="pill success" onclick="openBillingPortal()" style="cursor:pointer;">${ICON('crown','ico ico-sm')} ${planLabel()}</button>`;
    dlPill.style.display = 'none';
    info.textContent = 'Unlimited downloads on your plan';
  } else {
    planPill.innerHTML = `<a class="btn btn-primary btn-xs" href="pricing">${ICON('sparkle','ico ico-sm')} <span>Upgrade</span></a>`;
    const left = downloadsLeft();
    const used = CURRENT_USER?.downloadsUsed || 0;
    const lim = CURRENT_USER?.downloadLimit || 10;
    dlPill.style.display = '';
    dlPill.innerHTML = `<span class="pill" style="background:var(--bg-2);color:var(--muted);border:1px solid var(--border);">${ICON('download','ico ico-sm')} ${used} of ${lim} free downloads used</span>`;
    info.innerHTML = `${left} of ${lim} downloads left this month on Free plan. <a href="pricing" style="color:var(--accent);">Go unlimited →</a>`;
  }
}

(async () => {
  document.getElementById('back-link').innerHTML = `${ICON('arrowLeft')} <span>Back to Editor</span>`;
  document.getElementById('es-title').innerHTML = `${ICON('settings')} <span style="margin-left:6px;">Export Settings</span>`;
  selectFormat(SELECTED_FORMAT);
  const fitBox = document.getElementById('fit-one-page');
  if (fitBox) fitBox.checked = !!(resume.customize && resume.customize.fitOnePage);
  render();
  await loadCurrentUser();
  updatePills();
})();
</script>
