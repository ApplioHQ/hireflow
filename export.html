<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Export — HireFlow</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  .export-grid { display:grid; grid-template-columns: 1fr 320px; gap:24px; padding:24px; max-width:1240px; margin:0 auto; }
  .resume-page {
    background:#fff; color:#111;
    width: 100%; max-width: 850px;
    min-height: 1100px;
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
    overflow: hidden; border-radius: 4px;
    font-size: 14px; line-height: 1.45;
    margin: 0 auto;
  }
  @media print {
    body, .app-body-scroll { background: #fff !important; }
    .app-topbar, .export-side { display:none !important; }
    .export-grid { display:block; padding:0; max-width:none; }
    .resume-page { box-shadow:none; aspect-ratio:auto; border-radius:0; }
  }
</style>
</head>
<body class="app-body-scroll">
<header class="app-topbar">
  <div class="brand"><div class="brand-icon"></div><span>HireFlow</span></div>
  <nav class="topbar-tabs">
    <a class="topbar-tab" href="editor.html" id="back-link"></a>
  </nav>
  <div class="topbar-right">
    <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign out</button>
  </div>
</header>

<div class="export-grid">
  <div id="resume-preview" class="resume-page"></div>

  <aside class="export-side">
    <div class="section-card">
      <h3 style="margin-bottom:14px;" id="es-title"></h3>
      <div class="form-field">
        <label>File Format</label>
        <div style="display:grid; grid-template-columns: repeat(3,1fr); gap:6px;">
          <button class="btn btn-secondary btn-sm" onclick="exportPDF()">PDF</button>
          <button class="btn btn-secondary btn-sm" onclick="exportHTML()">HTML</button>
          <button class="btn btn-secondary btn-sm" onclick="exportTXT()">TXT</button>
        </div>
      </div>
      <div class="form-field">
        <label>Page Size</label>
        <select id="page-size">
          <option value="letter">US Letter (8.5×11)</option>
          <option value="a4">A4</option>
        </select>
      </div>
      <div class="form-field">
        <label>Margins</label>
        <select id="margins">
          <option>Normal</option><option>Narrow</option><option>Wide</option>
        </select>
      </div>
      <button class="btn btn-primary btn-block" onclick="exportPDF()" id="btn-pdf"></button>
      <button class="btn btn-secondary btn-block" style="margin-top:8px;" onclick="window.print()" id="btn-print"></button>
    </div>
  </aside>
</div>

<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/templates.js"></script>
<script>
const TOKEN = localStorage.getItem('hf_token');
if (!TOKEN) location.href = 'login.html';
const resume = JSON.parse(localStorage.getItem('hf_resume') || '{}');

function render() {
  document.getElementById('resume-preview').innerHTML =
    renderTemplate(resume.template || 'modern', resume, false, resume.customize?.accent);
}

function exportPDF() { window.print(); }
function exportHTML() {
  const html = document.getElementById('resume-preview').innerHTML;
  const blob = new Blob([`<!DOCTYPE html><meta charset="utf-8"><style>body{margin:0;padding:0;}.page{padding:36px;}</style><div class="page">${html}</div>`], {type:'text/html'});
  download(blob, 'resume.html');
}
function exportTXT() {
  const txt = document.getElementById('resume-preview').innerText;
  download(new Blob([txt], {type:'text/plain'}), 'resume.txt');
}
function download(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}
function signOut(){ localStorage.removeItem('hf_token'); location.href='index.html'; }

// hydrate
document.getElementById('back-link').innerHTML = `${ICON('arrowLeft')} <span>Back to Editor</span>`;
document.getElementById('es-title').innerHTML = `${ICON('settings')} <span style="margin-left:6px;">Export Settings</span>`;
document.getElementById('btn-pdf').innerHTML = `${ICON('download')} <span>Download PDF</span>`;
document.getElementById('btn-print').innerHTML = `<span>Print</span>`;
render();
</script>
</body>
</html>
