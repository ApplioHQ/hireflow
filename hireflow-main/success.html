<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Premium — Applio</title>
<link rel="icon" href="logo.ico">
<link rel="stylesheet" href="css/styles.css">
<style>
  .success-wrap { max-width: 480px; margin: 80px auto; text-align: center; padding: 0 24px; }
  .success-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--gradient); margin: 0 auto 24px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .success-icon svg { width: 36px; height: 36px; }
  .success-wrap h1 { font-size: 32px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 12px; }
  .success-wrap p { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
  .success-wrap .btn { padding: 12px 24px; }
</style>
</head>
<body class="app-body-scroll">
<header class="app-topbar">
  <a href="index.html" class="brand"><img src="logo.jpeg" class="brand-logo" alt="Applio"><span>Applio</span></a>
</header>

<main class="success-wrap">
  <div class="success-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1 id="title">Welcome to Premium</h1>
  <p id="msg">Your payment is being processed. AI features and unlimited downloads will unlock in just a moment.</p>
  <a href="editor.html" class="btn btn-primary">Open Editor →</a>
</main>

<script src="js/config.js"></script>
<script src="js/notify.js"></script>
<script src="js/plan.js"></script>
<script>
const params = new URLSearchParams(location.search);
const plan = params.get('plan');
if (plan === 'lifetime') {
  document.getElementById('title').textContent = 'Welcome to Lifetime';
  document.getElementById('msg').textContent = 'Thanks for going Lifetime. All features are now yours, forever.';
}
// Poll briefly so the user sees their plan flip
(async () => {
  for (let i = 0; i < 8; i++) {
    await new Promise(r => setTimeout(r, 1500));
    await loadCurrentUser();
    if (CURRENT_USER && CURRENT_USER.isPaid) break;
  }
})();
</script>
</body>
</html>
