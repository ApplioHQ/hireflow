<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Prep, Applio</title>
<link rel="icon" href="logo.ico">
<link rel="stylesheet" href="css/styles.css">
<script src="js/theme.js"></script>
<style>
  .ip-tip { margin-bottom: 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-2); overflow: hidden; }
  .ip-tip summary { cursor: pointer; padding: 9px 12px; font-size: 12.5px; font-weight: 600; color: var(--accent); list-style: none; user-select: none; }
  .ip-tip summary::-webkit-details-marker { display: none; }
  .ip-tip[open] summary { border-bottom: 1px solid var(--border); }
  .ip-tip p { margin: 0; padding: 10px 12px; font-size: 13px; line-height: 1.6; color: var(--muted); }
</style>
</head>
<body class="app-body-scroll">
<header class="app-topbar">
  <div class="brand"><img src="logo.jpeg" class="brand-logo" alt="Applio"><span>Applio</span></div>
  <nav class="topbar-tabs">
    <a class="topbar-tab" href="editor.html">Resume Builder</a>
    <a class="topbar-tab" href="jobs.html">Job Tracker</a>
    <a class="topbar-tab active" href="interview.html">Interview Prep</a>
    <a class="topbar-tab" href="match.html">Best Match</a>
  </nav>
  <div class="topbar-right">
    <span id="health-badge"></span>
    <span id="plan-pill"></span>
    <button class="theme-toggle" onclick="toggleTheme()">☀️ Light</button>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign out</button>
  </div>
</header>

<main style="padding:32px 20px; max-width:820px; margin:0 auto;">
  <div class="section-card">
    <div class="section-head"><h3 id="ip-title"></h3></div>
    <p style="color:var(--muted); font-size:13px; margin-bottom:16px;">Tell us about the role and we'll generate practice interview questions tailored to your resume.</p>
    <div class="form-field">
      <label>Role / Title</label>
      <input id="role" placeholder="e.g. Senior Software Engineer, Product Manager">
    </div>
    <div class="form-field">
      <label>Job Description (optional)</label>
      <textarea id="jd" rows="5" placeholder="Paste job description for more targeted questions…"></textarea>
    </div>
    <button class="btn btn-primary btn-block" onclick="generate()" id="gen-btn"></button>
  </div>

  <div id="results"></div>
</main>

<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/notify.js"></script>
<script src="js/plan.js"></script>
<script src="js/health-badge.js"></script>
<script>

function showAILoading(msg) { aiLoading(msg); }
function hideAILoading() { aiLoadingDone(); }

const API = window.HIREFLOW_CONFIG.API_URL;
const TOKEN = localStorage.getItem('hf_token');
if (!TOKEN) location.href = 'login.html';
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

async function generate() {
  const role = document.getElementById('role').value.trim();
  const jd = document.getElementById('jd').value.trim();
  if (!role) return toast('Enter a role first', { type: 'warn' });
  let resume; try { resume = JSON.parse(localStorage.getItem('hf_resume') || '{}'); } catch { resume = {}; }
  document.getElementById('results').innerHTML = '';
  showAILoading('Generating your interview questions…');
  try {
    const r = await fetch(API + '/ai/interview', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
      body: JSON.stringify({ role, jobDescription: jd, resume })
    });
    hideAILoading();
    if (!r.ok) throw new Error('AI failed');
    const data = await r.json();
    if (data._trial) _noteTrial(data._trial);
    const questions = _parseQuestions((data.text || '').trim());
    if (!questions.length) throw new Error('No questions returned, try again.');
    _startPracticeMode(questions);
  } catch(e) {
    hideAILoading();
    document.getElementById('results').innerHTML = '<div class="section-card" style="color:var(--danger);">Something went wrong generating your questions. Please try again.</div>';
  }
}

// Parse the [Category] / "1. Question" / "Tip: …" output into structured items.
function _parseQuestions(raw) {
  const out = [];
  let category = 'General', cur = null;
  raw.split('\n').forEach(function(line) {
    const t = line.trim();
    if (!t) return;
    const cat = t.match(/^\[(.+?)\]\s*$/);
    if (cat) { category = cat[1].trim(); return; }
    const tip = t.match(/^tip\s*[:\-]\s*(.*)$/i);
    if (tip) { if (cur) cur.tip = (cur.tip ? cur.tip + ' ' : '') + tip[1].trim(); return; }
    const q = t.match(/^\d+[.):]\s*(.*)$/);
    if (q) { cur = { question: q[1].trim(), category: category, tip: '' }; out.push(cur); return; }
    if (cur && !cur.tip) cur.question += ' ' + t; // wrapped question line
  });
  if (out.length) return out;
  return raw.split('\n').filter(function(l){ return l.trim().length > 10; })
            .map(function(q){ return { question: q.replace(/^[\d]+[.):]\s*/, '').trim(), category: 'General', tip: '' }; });
}

function _noteTrial(t) {
  if (typeof CURRENT_USER !== 'undefined' && CURRENT_USER) {
    CURRENT_USER.aiTrials = CURRENT_USER.aiTrials || {};
    CURRENT_USER.aiTrials[t.feature] = t.used;
  }
  toast(t.remaining > 0 ? 'Free trial used, ' + t.remaining + ' left' : 'Last free trial used, upgrade for unlimited',
    { type: t.remaining > 0 ? 'info' : 'warn', duration: 3500 });
}

// ── Practice Mode ──
var _practiceQs = [];
var _practiceIdx = 0;
var _practiceTimer = null;
var _practiceStart = null;

function _startPracticeMode(questions) {
  _practiceQs = questions;
  _practiceIdx = 0;
  _renderPracticeQuestion();
}

function _renderPracticeQuestion() {
  var q = _practiceQs[_practiceIdx];
  var total = _practiceQs.length;
  var res = document.getElementById('results');
  var catColors = { Behavioral:'#6366f1', 'Role-Specific':'#06b6d4', Technical:'#06b6d4', Situational:'#f59e0b', Closing:'#22c55e', General:'#8b5cf6' };
  var catColor = catColors[q.category] || '#8b5cf6';
  res.innerHTML = '<div class="section-card">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap;">'
    + '<div style="display:flex;align-items:center;gap:10px;">'
    + '<span style="font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:' + catColor + ';background:' + catColor + '22;border:1px solid ' + catColor + '44;border-radius:20px;padding:3px 10px;">' + esc(q.category || 'Question') + '</span>'
    + '<span style="font-size:12px;color:var(--muted);">Question ' + (_practiceIdx+1) + ' of ' + total + '</span>'
    + '</div>'
    + '<div style="display:flex;align-items:center;gap:8px;">'
    + '<div id="_ptimer" style="font-size:18px;font-weight:700;color:var(--accent);min-width:46px;text-align:right;font-variant-numeric:tabular-nums;">0:00</div>'
    + '<button class="btn btn-ghost btn-xs" id="_ptimer-toggle">Start Timer</button>'
    + '</div></div>'
    + '<div style="height:4px;background:var(--bg-2);border-radius:2px;margin-bottom:18px;overflow:hidden;">'
    + '<div style="width:' + Math.round(((_practiceIdx+1)/total)*100) + '%;height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:2px;transition:width .35s;"></div>'
    + '</div>'
    + '<h3 style="font-size:17px;font-weight:600;line-height:1.5;margin-bottom:14px;">' + esc(q.question) + '</h3>'
    + (q.tip ? '<details class="ip-tip"><summary>💡 Coaching tip</summary><p>' + esc(q.tip) + '</p></details>' : '')
    + '<div class="form-field"><label style="font-size:12px;">Your Answer <span style="color:var(--muted);font-weight:400;">, aim for STAR: Situation · Task · Action · Result</span></label>'
    + '<textarea id="_panswer" rows="6" placeholder="Type your answer here…" style="width:100%;box-sizing:border-box;padding:12px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;line-height:1.6;resize:vertical;"></textarea></div>'
    + '<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">'
    + '<button class="btn btn-primary btn-sm" id="_psubmit">' + ICON('sparkle','ico ico-sm') + ' Get AI Feedback</button>'
    + (_practiceIdx > 0 ? '<button class="btn btn-ghost btn-sm" id="_pprev">← Previous</button>' : '')
    + (_practiceIdx < total-1 ? '<button class="btn btn-secondary btn-sm" id="_pnext">Next →</button>' : '')
    + '<button class="btn btn-ghost btn-sm" id="_pall" style="margin-left:auto;">View All</button>'
    + '</div>'
    + '<div id="_pfeedback" style="margin-top:16px;"></div>'
    + '</div>';

  // Timer
  var timerEl = document.getElementById('_ptimer');
  var timerBtn = document.getElementById('_ptimer-toggle');
  var running = false;
  clearInterval(_practiceTimer);
  _practiceStart = null;
  timerBtn.addEventListener('click', function() {
    if (!running) {
      _practiceStart = Date.now();
      running = true; timerBtn.textContent = 'Stop';
      _practiceTimer = setInterval(function() {
        var elapsed = Math.floor((Date.now() - _practiceStart) / 1000);
        var m = Math.floor(elapsed/60); var sec = elapsed%60;
        timerEl.textContent = m + ':' + (sec<10?'0':'') + sec;
        // Color red after 2 min
        timerEl.style.color = elapsed > 120 ? 'var(--danger)' : 'var(--accent)';
      }, 500);
    } else {
      clearInterval(_practiceTimer); running = false; timerBtn.textContent = 'Reset';
    }
  });

  // AI Feedback
  document.getElementById('_psubmit').addEventListener('click', async function() {
    var answer = document.getElementById('_panswer').value.trim();
    if (!answer) { toast('Type your answer first', {type:'warn'}); return; }
    var fb = document.getElementById('_pfeedback');
    fb.innerHTML = '<div style="color:var(--muted);font-size:13px;animation:_pu 1.5s ease-in-out infinite;">Getting AI feedback...</div>';
    try {
      var r = await fetch(API + '/ai/interview-feedback', {
        method: 'POST',
        headers: {'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
        body: JSON.stringify({ question: q.question, answer: answer })
      });
      if (r.status === 402) { fb.innerHTML = ''; showUpgradeModal('ai'); return; }
      if (!r.ok) throw new Error('AI failed');
      var data = await r.json();
      if (data._trial) _noteTrial(data._trial);
      var score = data.score || 0;
      var col = score >= 75 ? '#6ee7b7' : score >= 50 ? '#fcd34d' : '#fca5a5';
      fb.innerHTML = '<div style="border:1px solid rgba(99,102,241,.3);border-radius:10px;overflow:hidden;margin-top:8px;">'
        + '<div style="background:rgba(99,102,241,.1);padding:10px 14px;display:flex;align-items:center;gap:10px;">'
        + '<span style="font-size:20px;font-weight:800;color:' + col + ';">' + score + '/100</span>'
        + '<span style="font-size:13px;font-weight:600;color:var(--text);">AI Feedback</span>'
        + '</div>'
        + '<div style="padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;color:var(--text);">' + esc(data.feedback||'') + '</div>'
        + '</div>';
    } catch(e) {
      fb.innerHTML = '<div style="color:var(--danger);font-size:13px;">We couldn\'t score that answer right now. Please try again.</div>';
    }
  });

  // Navigation
  var prevBtn = document.getElementById('_pprev');
  var nextBtn = document.getElementById('_pnext');
  var allBtn  = document.getElementById('_pall');
  if (prevBtn) prevBtn.addEventListener('click', function() { clearInterval(_practiceTimer); _practiceIdx--; _renderPracticeQuestion(); });
  if (nextBtn) nextBtn.addEventListener('click', function() { clearInterval(_practiceTimer); _practiceIdx++; _renderPracticeQuestion(); });
  if (allBtn) allBtn.addEventListener('click', function() {
    clearInterval(_practiceTimer);
    var res2 = document.getElementById('results');
    res2.innerHTML = '<div class="section-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><h3>All Questions</h3>'
      + '<button class="btn btn-ghost btn-xs" onclick="_renderPracticeQuestion()">← Back to practice</button></div>'
      + _practiceQs.map(function(q2, i) {
          return '<div style="padding:12px 14px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;" onclick="_practiceIdx=' + i + ';_renderPracticeQuestion();">'
            + '<div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;">Q' + (i+1) + ' · ' + esc(q2.category || 'General') + '</div>'
            + '<div style="font-size:13px;line-height:1.5;">' + esc(q2.question) + '</div>'
            + '</div>';
        }).join('')
      + '</div>';
  });
}


function signOut(){ localStorage.removeItem('hf_token'); location.href='index.html'; }

(async () => {
  await loadCurrentUser();
  document.getElementById('ip-title').innerHTML = `${ICON('mic')} <span>AI Interview Preparation</span>`;
  document.getElementById('gen-btn').innerHTML = `${ICON('sparkle')} <span>Generate Practice Questions</span>`;
  const planPill = document.getElementById('plan-pill');
  if (isPaid()) planPill.innerHTML = `<button class="pill success" onclick="openBillingPortal()" style="cursor:pointer;">${ICON('crown','ico ico-sm')} ${planLabel()}</button>`;
  else planPill.innerHTML = `<a class="btn btn-primary btn-xs" href="pricing.html">${ICON('sparkle','ico ico-sm')} <span>Upgrade</span></a>`;
  // Interview Prep is free for everyone, no trial banner or paywall.
  if (isFree()) {
    const note = document.createElement('p');
    note.style.cssText = 'font-size:12px;color:var(--muted);text-align:center;margin-top:10px;';
    note.innerHTML = `✨ Interview Prep is <strong style="color:var(--accent);">free</strong> for everyone.`;
    document.querySelector('main .section-card').appendChild(note);
  }
})();
</script>
</body>
</html>
