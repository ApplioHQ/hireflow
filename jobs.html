<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Job Tracker, Applio</title>
<link rel="icon" href="logo.ico">
<link rel="stylesheet" href="css/styles.css">
<script src="js/theme.js"></script>
<style>
  .jt-stats { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:20px; }
  .jt-stat {
    display:flex; flex-direction:column; align-items:center; gap:2px;
    padding:14px 8px; border-radius:var(--r-md); cursor:pointer;
    background:var(--bg-2); border:1px solid var(--border);
    border-top:3px solid var(--c); box-shadow:var(--sh-1);
    transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease);
  }
  .jt-stat:hover { transform:translateY(-2px); box-shadow:var(--sh-2); }
  .jt-stat.active { box-shadow:0 0 0 2px var(--c), var(--sh-1); }
  .jt-stat-num { font-size:24px; font-weight:800; color:var(--c); line-height:1; }
  .jt-stat-label { font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.02em; }
  .jt-card { box-shadow:var(--sh-1), var(--hi); transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
  .jt-card:hover { transform:translateY(-2px); box-shadow:var(--sh-2), var(--hi); }
  .jt-followup {
    margin-top:8px; font-size:12px; font-weight:600; color:#b45309;
    background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.3);
    border-radius:8px; padding:6px 10px;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .jt-followup-btn {
    font:inherit; font-size:11px; font-weight:700; cursor:pointer;
    color:#fff; background:#f59e0b; border:0; border-radius:6px; padding:4px 10px;
    white-space:nowrap;
  }
  .jt-followup-btn:hover { background:#d97706; }
  .jt-mail-field { width:100%; box-sizing:border-box; padding:9px 11px; background:var(--bg-2);
    border:1px solid var(--border); border-radius:var(--r-sm); color:var(--text); font-size:13px; font-family:inherit;
    transition:border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease); }
  .jt-mail-field:focus { outline:none; border-color:var(--accent); box-shadow:var(--ring); }
  @media (max-width:640px){ .jt-stats { grid-template-columns:repeat(3,1fr); } }
</style>
</head>
<body class="app-body-scroll">
<header class="app-topbar">
  <div class="brand"><img src="logo.jpeg" width="32" height="32" class="brand-logo" alt="Applio"><span>Applio</span></div>
  <nav class="topbar-tabs">
    <a class="topbar-tab" href="dashboard">Home</a>
    <a class="topbar-tab" href="autopilot">Autopilot</a>
    <a class="topbar-tab" href="editor">Resume Builder</a>
    <a class="topbar-tab active" href="jobs">Job Tracker</a>
    <a class="topbar-tab" href="interview">Interview Prep</a>
    <a class="topbar-tab" href="match">Best Match</a>
    <a class="topbar-tab" href="cover-letter">Cover Letter</a>
    <a class="topbar-tab" href="assistant">Career Coach</a>
  </nav>
  <div class="topbar-right">
    <span id="health-badge"></span>
    <button class="theme-toggle" onclick="toggleTheme()">☀️ Light</button>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign out</button>
  </div>
</header>

<main style="padding:32px 20px; max-width:960px; margin:0 auto;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <div>
      <h2 style="font-size:22px; display:flex; align-items:center; gap:10px;" id="jt-title"></h2>
      <p style="color:var(--muted); font-size:13px;" id="job-count">0 jobs tracked</p>
    </div>
    <button class="btn btn-primary" onclick="toggleForm()" id="add-btn"></button>
  </div>

  <!-- Status stat tiles -->
  <div id="jt-stats" class="jt-stats"></div>

  <div id="add-form" style="display:none; margin-bottom:20px;">
    <div class="section-card">
      <h3 style="margin-bottom:14px;" id="form-title">Add New Job</h3>
      <div class="grid-2">
        <div class="form-field"><label>Job Title</label><input id="j-title"></div>
        <div class="form-field"><label>Company</label><input id="j-company"></div>
      </div>
      <div class="grid-2">
        <div class="form-field"><label>Location</label><input id="j-location"></div>
        <div class="form-field"><label>Status</label>
          <select id="j-status">
            <option>Saved</option><option>Applied</option><option>Interviewing</option><option>Offer</option><option>Rejected</option>
          </select>
        </div>
      </div>
      <div class="form-field"><label>Notes / Link</label><input id="j-notes"></div>
      <div class="form-field"><label>Job description <span style="color:var(--muted); font-weight:400; font-size:12px;">— optional, powers the Skill Gap check &amp; tailoring</span></label>
        <textarea id="j-jd" rows="4" placeholder="Paste the posting here…" style="width:100%; box-sizing:border-box; padding:10px 12px; background:var(--bg-2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; line-height:1.5; resize:vertical; font-family:inherit;"></textarea></div>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-secondary" onclick="toggleForm()">Cancel</button>
        <button class="btn btn-primary" onclick="saveJob()" id="form-save-btn">Save Job</button>
      </div>
    </div>
  </div>

  <div style="margin-bottom:14px;">
    <input id="jt-search" placeholder="Search by title, company, or notes…" oninput="render()"
      style="width:100%; box-sizing:border-box; padding:10px 14px; background:var(--bg-2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px;">
  </div>

  <div id="filters" style="display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;">
    <button class="pill" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="pill" data-filter="Saved" onclick="setFilter('Saved')">Saved</button>
    <button class="pill" data-filter="Applied" onclick="setFilter('Applied')">Applied</button>
    <button class="pill" data-filter="Interviewing" onclick="setFilter('Interviewing')">Interviewing</button>
    <button class="pill" data-filter="Offer" onclick="setFilter('Offer')">Offer</button>
    <button class="pill" data-filter="Rejected" onclick="setFilter('Rejected')">Rejected</button>
  </div>

  <div id="job-list"></div>

  <div id="empty" class="section-card" style="text-align:center; padding:60px 20px;">
    <div id="empty-icon" style="display:flex; justify-content:center; margin-bottom:12px; color:var(--muted);"></div>
    <h3>No jobs tracked yet</h3>
    <p style="color:var(--muted); font-size:13px; margin:8px 0 16px;">Start tracking your job applications to stay organized.</p>
    <button class="btn btn-primary" onclick="toggleForm()" id="empty-btn"></button>
  </div>
</main>

<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/notify.js"></script>
<script src="js/plan.js"></script>
<script src="js/health-badge.js"></script>
<script src="js/jobsync.js"></script>
<script>
const TOKEN = localStorage.getItem('hf_token');
if (!TOKEN) location.href = 'login';
let jobs = (function () {
  try { const j = JSON.parse(localStorage.getItem('hf_jobs') || '[]'); return Array.isArray(j) ? j : []; }
  catch { return []; }  // corrupt storage must not white-screen the tracker
})();
let filter = 'all';
let editingId = null;

// Monotonic, collision-proof id (numeric, so the unquoted onclick handlers stay
// valid). Date.now() alone collides when two jobs are added in the same ms.
let _lastId = 0;
function _uid() { const n = Date.now(); _lastId = n > _lastId ? n : _lastId + 1; return _lastId; }

const STATUSES = ['Saved','Applied','Interviewing','Offer','Rejected'];
const STATUS_COLOR = { Saved:'#64748b', Applied:'#6366f1', Interviewing:'#f59e0b', Offer:'#22c55e', Rejected:'#ef4444' };

// Nudge to follow up on active applications that have gone quiet. Pure client-side:
// uses statusAt (when the status last changed) and falls back to addedAt for older
// jobs saved before we tracked it.
const FOLLOWUP_DAYS = 7;
function _followUpDays(j){
  if (j.status !== 'Applied' && j.status !== 'Interviewing') return 0;
  const since = j.statusAt || j.addedAt || Date.now();
  const days = Math.floor((Date.now() - since) / 86400000);
  return days >= FOLLOWUP_DAYS ? days : 0;
}

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function _save(){
  try { localStorage.setItem('hf_jobs', JSON.stringify(jobs)); if (window.HFJobsSync) HFJobsSync.push(); return true; }
  catch(e){ toast('Could not save, your browser storage may be full', { type:'error', duration:4500 }); return false; }
}
function toggleForm(){
  const f=document.getElementById('add-form');
  const opening = f.style.display==='none';
  f.style.display = opening ? '' : 'none';
  if (!opening) { editingId = null; document.getElementById('form-title').textContent='Add New Job'; document.getElementById('form-save-btn').textContent='Save Job'; }
}
function setFilter(f){ filter=f; render(); }

function saveJob(){
  const title = document.getElementById('j-title').value.trim();
  const company = document.getElementById('j-company').value.trim();
  if (!title || !company) return toast('Title and company are required', { type: 'warn' });
  const fields = { title, company,
    location: document.getElementById('j-location').value.trim(),
    status: document.getElementById('j-status').value,
    notes: document.getElementById('j-notes').value.trim(),
    jd: document.getElementById('j-jd').value.trim().slice(0, 8000) };
  if (editingId) {
    const j = jobs.find(x=>x.id===editingId);
    if (j) { const changed = j.status !== fields.status; Object.assign(j, fields); if (changed || !j.statusAt) j.statusAt = Date.now(); }
    toast('Job updated', { type:'success' });
  } else {
    jobs.unshift(Object.assign({ id: _uid(), addedAt: Date.now(), statusAt: Date.now() }, fields));
    toast('Job added', { type:'success' });
  }
  _save();
  ['j-title','j-company','j-location','j-notes','j-jd'].forEach(id=>document.getElementById(id).value='');
  editingId = null;
  toggleForm(); render();
}

function editJob(id){
  const j = jobs.find(x=>x.id===id); if(!j) return;
  editingId = id;
  document.getElementById('j-title').value = j.title || '';
  document.getElementById('j-company').value = j.company || '';
  document.getElementById('j-location').value = j.location || '';
  document.getElementById('j-status').value = j.status || 'Saved';
  document.getElementById('j-notes').value = j.notes || '';
  document.getElementById('j-jd').value = j.jd || '';
  document.getElementById('form-title').textContent = 'Edit Job';
  document.getElementById('form-save-btn').textContent = 'Save Changes';
  document.getElementById('add-form').style.display = '';
  document.getElementById('add-form').scrollIntoView({ behavior:'smooth', block:'center' });
}

async function removeJob(id){
  const ok = await confirmDialog({ title:'Remove job?', body:'This removes it from your tracker.', confirmText:'Remove', danger:true });
  if (!ok) return;
  jobs = jobs.filter(j=>j.id!==id); _save(); render();
}
function updateStatus(id, s){ const j=jobs.find(x=>x.id===id); if(j){ if(j.status!==s) j.statusAt=Date.now(); j.status=s; _save(); render(); } }

function _statusBadge(s){
  const c = STATUS_COLOR[s] || '#64748b';
  return `<span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:${c};background:${c}1f;border:1px solid ${c}40;border-radius:20px;padding:3px 10px;">
    <span style="width:6px;height:6px;border-radius:50%;background:${c};"></span>${esc(s)}</span>`;
}

function _renderStats(){
  const counts = {}; STATUSES.forEach(s=>counts[s]=0);
  jobs.forEach(j=>{ if(counts[j.status]!=null) counts[j.status]++; });
  document.getElementById('jt-stats').innerHTML = STATUSES.map(s=>{
    const c = STATUS_COLOR[s]; const active = filter===s;
    return `<button class="jt-stat${active?' active':''}" onclick="setFilter('${active?'all':s}')" style="--c:${c};">
      <span class="jt-stat-num">${counts[s]}</span>
      <span class="jt-stat-label">${s}</span>
    </button>`;
  }).join('');
}

function render(){
  const q = (document.getElementById('jt-search').value || '').toLowerCase();
  const list = jobs.filter(j => (filter==='all' || j.status===filter) &&
    (!q || [j.title,j.company,j.notes,j.location].some(v => (v||'').toLowerCase().includes(q))));
  const dueCount = jobs.filter(_followUpDays).length;
  document.getElementById('job-count').innerHTML = jobs.length + ' job' + (jobs.length===1?'':'s') + ' tracked' +
    (dueCount ? ` · <span style="color:#f59e0b;font-weight:600;">⏰ ${dueCount} to follow up</span>` : '');
  document.getElementById('empty').style.display = jobs.length===0 ? '' : 'none';
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('success', b.dataset.filter===filter));
  _renderStats();
  document.getElementById('job-list').innerHTML = (list.length===0 && jobs.length>0)
    ? `<div class="section-card" style="text-align:center;color:var(--muted);padding:30px;">No jobs match your search/filter.</div>`
    : list.map(j => { const fu = _followUpDays(j); return `
    <div class="section-card jt-card" style="margin-bottom:10px;border-left:3px solid ${STATUS_COLOR[j.status]||'#64748b'};">
      <div style="display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;">
        <div style="min-width:0;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;">
            <h4 style="margin:0;">${esc(j.title)} <span style="color:var(--muted); font-weight:normal;">at</span> ${esc(j.company)}</h4>
            ${_statusBadge(j.status)}
          </div>
          <div style="color:var(--muted); font-size:12px;">${j.location?esc(j.location)+' · ':''}added ${new Date(j.addedAt).toLocaleDateString()}</div>
          ${fu ? `<div class="jt-followup">
            <span>⏰ No update in ${fu} days, time to follow up on this ${j.status==='Interviewing'?'interview':'application'}.</span>
            <button class="jt-followup-btn" onclick="draftFollowUp(${j.id})">✉ Draft follow-up</button>
          </div>` : ''}
          ${j.notes ? `<p style="font-size:13px; margin-top:8px; word-break:break-word;">${esc(j.notes)}</p>`:''}
        </div>
        <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-end; flex-shrink:0;">
          <select onchange="updateStatus(${j.id}, this.value)" style="padding:5px 10px; background:var(--bg-2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px;">
            ${STATUSES.map(s=>`<option ${j.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
          <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;">
            <a class="btn btn-ghost btn-xs" href="skill-gap?job=${j.id}" title="See what this job wants that your resume is missing">${ICON('target','ico ico-sm')} Skill gap</a>
            <button class="btn btn-ghost btn-xs" onclick="editJob(${j.id})">${ICON('settings','ico ico-sm')} Edit</button>
            <button class="btn btn-ghost btn-xs" onclick="removeJob(${j.id})">${ICON('trash','ico ico-sm')} Remove</button>
          </div>
        </div>
      </div>
    </div>
  `; }).join('');
}
// Generate a ready-to-send follow-up email for a stale application/interview.
// Pure client-side template (no AI, no backend) tailored to the job's status.
function draftFollowUp(id){
  const j = jobs.find(x=>x.id===id); if(!j) return;
  const interviewing = j.status === 'Interviewing';
  const subject = interviewing
    ? `Thank you for the ${j.title} interview`
    : `Following up on my ${j.title} application`;
  const body = interviewing
    ? `Hi [Interviewer],\n\nThank you again for taking the time to speak with me about the ${j.title} role at ${j.company}. I really enjoyed our conversation about [topic you discussed] and came away even more excited about the opportunity.\n\nPlease let me know if there's anything else I can provide. I look forward to hearing about the next steps.\n\nBest regards,\n[Your name]`
    : `Hi [Hiring Manager],\n\nI recently applied for the ${j.title} role at ${j.company} and wanted to reaffirm my strong interest. I'm excited about [what draws you to the role], and I believe my experience in [your strength] would let me contribute quickly.\n\nI'd welcome the chance to discuss the role further and am happy to share any additional information. Thank you for your time and consideration.\n\nBest regards,\n[Your name]`;
  _openEmailDialog(subject, body);
}

function _openEmailDialog(subject, body){
  const old = document.getElementById('mail-dialog-bd'); if (old) old.remove();
  const bd = document.createElement('div');
  bd.id = 'mail-dialog-bd';
  bd.style.cssText = 'position:fixed;inset:0;z-index:1000;background:rgba(8,10,25,.6);display:flex;align-items:center;justify-content:center;padding:20px;';
  bd.innerHTML =
    '<div class="section-card" style="max-width:560px;width:100%;position:relative;">' +
      '<button id="md-x" style="position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;">×</button>' +
      '<h3 style="margin:0 0 4px;">✉ Follow-up email</h3>' +
      '<p style="font-size:12px;color:var(--muted);margin:0 0 14px;">Fill in the [bracketed] bits, then copy or open in your mail app.</p>' +
      '<label style="font-size:12px;color:var(--muted);">Subject</label>' +
      '<input id="md-subj" class="jt-mail-field" style="margin:4px 0 12px;">' +
      '<label style="font-size:12px;color:var(--muted);">Message</label>' +
      '<textarea id="md-body" rows="11" class="jt-mail-field" style="margin-top:4px;resize:vertical;line-height:1.5;"></textarea>' +
      '<div style="display:flex;gap:8px;margin-top:14px;">' +
        '<button class="btn btn-secondary" id="md-copy" style="flex:1;">Copy</button>' +
        '<button class="btn btn-primary" id="md-open" style="flex:1;">Open in email app</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(bd);
  bd.querySelector('#md-subj').value = subject;
  bd.querySelector('#md-body').value = body;
  const close = () => bd.remove();
  bd.addEventListener('click', e => { if (e.target === bd) close(); });
  bd.querySelector('#md-x').onclick = close;
  bd.querySelector('#md-copy').onclick = async () => {
    const text = bd.querySelector('#md-subj').value + '\n\n' + bd.querySelector('#md-body').value;
    try { await navigator.clipboard.writeText(text); toast('Copied to clipboard', { type:'success' }); }
    catch { toast('Copy failed, select the text manually', { type:'warn' }); }
  };
  bd.querySelector('#md-open').onclick = () => {
    const s = encodeURIComponent(bd.querySelector('#md-subj').value);
    const b = encodeURIComponent(bd.querySelector('#md-body').value);
    window.location.href = `mailto:?subject=${s}&body=${b}`;
  };
}

function signOut(){ localStorage.removeItem('hf_token'); location.href='/'; }

document.getElementById('jt-title').innerHTML = `${ICON('briefcase','ico ico-lg')} <span>Job Tracker</span>`;
document.getElementById('add-btn').innerHTML = `${ICON('plus','ico ico-sm')} <span>Add Job</span>`;
document.getElementById('empty-icon').innerHTML = ICON('briefcase','ico ico-lg').replace('class="ico ico-lg"','class="ico" style="width:48px;height:48px;"');
document.getElementById('empty-btn').innerHTML = `${ICON('plus','ico ico-sm')} <span>Add Your First Job</span>`;
render();
// Pull cloud jobs; if a newer set exists (e.g. added on another device), adopt + re-render.
if (window.HFJobsSync) HFJobsSync.pull(function (adopted) {
  if (adopted) { try { jobs = JSON.parse(localStorage.getItem('hf_jobs') || '[]'); if (!Array.isArray(jobs)) jobs = []; } catch (e) { jobs = []; } render(); }
});
</script>
  <script src="js/appnav.js"></script>
  <script src="js/acctcenter.js"></script>
<script src="/js/appshell.js"></script>
</body>
</html>
