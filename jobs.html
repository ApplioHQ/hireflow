<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker, Applio</title>
<link rel="icon" href="logo.ico">
<link rel="stylesheet" href="css/styles.css">
<script src="js/theme.js"></script>
<style>
  .jt-stats { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:20px; }
  .jt-stat {
    display:flex; flex-direction:column; align-items:center; gap:2px;
    padding:14px 8px; border-radius:12px; cursor:pointer;
    background:var(--bg-2); border:1px solid var(--border);
    border-top:3px solid var(--c); transition:transform .12s, box-shadow .12s, border-color .12s;
  }
  .jt-stat:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.18); }
  .jt-stat.active { box-shadow:0 0 0 2px var(--c); }
  .jt-stat-num { font-size:24px; font-weight:800; color:var(--c); line-height:1; }
  .jt-stat-label { font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.02em; }
  .jt-card { transition:transform .12s, box-shadow .12s; }
  .jt-card:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,0,0,.16); }
  @media (max-width:640px){ .jt-stats { grid-template-columns:repeat(3,1fr); } }
</style>
</head>
<body class="app-body-scroll">
<header class="app-topbar">
  <div class="brand"><img src="logo.jpeg" class="brand-logo" alt="Applio"><span>Applio</span></div>
  <nav class="topbar-tabs">
    <a class="topbar-tab" href="editor.html">Resume Builder</a>
    <a class="topbar-tab active" href="jobs.html">Job Tracker</a>
    <a class="topbar-tab" href="interview.html">Interview Prep</a>
    <a class="topbar-tab" href="match.html">Best Match</a>
  </nav>
  <div class="topbar-right">
    <span id="health-badge"></span>
    <button class="theme-toggle" onclick="toggleTheme()">☀️ Light</button>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">Sign out</button>
  </div>
</header>

<main style="padding:32px 20px; max-width:960px; margin:0 auto;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <div>
      <h2 style="font-size:22px; display:flex; align-items:center; gap:10px;" id="jt-title"></h2>
      <p style="color:var(--muted); font-size:13px;" id="job-count">0 jobs tracked</p>
    </div>
    <button class="btn btn-primary" onclick="toggleForm()" id="add-btn"></button>
  </div>

  <!-- Status stat tiles -->
  <div id="jt-stats" class="jt-stats"></div>

  <div id="add-form" style="display:none; margin-bottom:20px;">
    <div class="section-card">
      <h3 style="margin-bottom:14px;" id="form-title">Add New Job</h3>
      <div class="grid-2">
        <div class="form-field"><label>Job Title</label><input id="j-title"></div>
        <div class="form-field"><label>Company</label><input id="j-company"></div>
      </div>
      <div class="grid-2">
        <div class="form-field"><label>Location</label><input id="j-location"></div>
        <div class="form-field"><label>Status</label>
          <select id="j-status">
            <option>Saved</option><option>Applied</option><option>Interviewing</option><option>Offer</option><option>Rejected</option>
          </select>
        </div>
      </div>
      <div class="form-field"><label>Notes / Link</label><input id="j-notes"></div>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-secondary" onclick="toggleForm()">Cancel</button>
        <button class="btn btn-primary" onclick="saveJob()" id="form-save-btn">Save Job</button>
      </div>
    </div>
  </div>

  <div style="margin-bottom:14px;">
    <input id="jt-search" placeholder="Search by title, company, or notes…" oninput="render()"
      style="width:100%; box-sizing:border-box; padding:10px 14px; background:var(--bg-2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px;">
  </div>

  <div id="filters" style="display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;">
    <button class="pill" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="pill" data-filter="Saved" onclick="setFilter('Saved')">Saved</button>
    <button class="pill" data-filter="Applied" onclick="setFilter('Applied')">Applied</button>
    <button class="pill" data-filter="Interviewing" onclick="setFilter('Interviewing')">Interviewing</button>
    <button class="pill" data-filter="Offer" onclick="setFilter('Offer')">Offer</button>
    <button class="pill" data-filter="Rejected" onclick="setFilter('Rejected')">Rejected</button>
  </div>

  <div id="job-list"></div>

  <div id="empty" class="section-card" style="text-align:center; padding:60px 20px;">
    <div id="empty-icon" style="display:flex; justify-content:center; margin-bottom:12px; color:var(--muted);"></div>
    <h3>No jobs tracked yet</h3>
    <p style="color:var(--muted); font-size:13px; margin:8px 0 16px;">Start tracking your job applications to stay organized.</p>
    <button class="btn btn-primary" onclick="toggleForm()" id="empty-btn"></button>
  </div>
</main>

<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/notify.js"></script>
<script src="js/health-badge.js"></script>
<script>
const TOKEN = localStorage.getItem('hf_token');
if (!TOKEN) location.href = 'login.html';
let jobs = (function () {
  try { const j = JSON.parse(localStorage.getItem('hf_jobs') || '[]'); return Array.isArray(j) ? j : []; }
  catch { return []; }  // corrupt storage must not white-screen the tracker
})();
let filter = 'all';
let editingId = null;

// Monotonic, collision-proof id (numeric, so the unquoted onclick handlers stay
// valid). Date.now() alone collides when two jobs are added in the same ms.
let _lastId = 0;
function _uid() { const n = Date.now(); _lastId = n > _lastId ? n : _lastId + 1; return _lastId; }

const STATUSES = ['Saved','Applied','Interviewing','Offer','Rejected'];
const STATUS_COLOR = { Saved:'#64748b', Applied:'#6366f1', Interviewing:'#f59e0b', Offer:'#22c55e', Rejected:'#ef4444' };

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function _save(){
  try { localStorage.setItem('hf_jobs', JSON.stringify(jobs)); return true; }
  catch(e){ toast('Could not save, your browser storage may be full', { type:'error', duration:4500 }); return false; }
}
function toggleForm(){
  const f=document.getElementById('add-form');
  const opening = f.style.display==='none';
  f.style.display = opening ? '' : 'none';
  if (!opening) { editingId = null; document.getElementById('form-title').textContent='Add New Job'; document.getElementById('form-save-btn').textContent='Save Job'; }
}
function setFilter(f){ filter=f; render(); }

function saveJob(){
  const title = document.getElementById('j-title').value.trim();
  const company = document.getElementById('j-company').value.trim();
  if (!title || !company) return toast('Title and company are required', { type: 'warn' });
  const fields = { title, company,
    location: document.getElementById('j-location').value.trim(),
    status: document.getElementById('j-status').value,
    notes: document.getElementById('j-notes').value.trim() };
  if (editingId) {
    const j = jobs.find(x=>x.id===editingId); if (j) Object.assign(j, fields);
    toast('Job updated', { type:'success' });
  } else {
    jobs.unshift(Object.assign({ id: _uid(), addedAt: Date.now() }, fields));
    toast('Job added', { type:'success' });
  }
  _save();
  ['j-title','j-company','j-location','j-notes'].forEach(id=>document.getElementById(id).value='');
  editingId = null;
  toggleForm(); render();
}

function editJob(id){
  const j = jobs.find(x=>x.id===id); if(!j) return;
  editingId = id;
  document.getElementById('j-title').value = j.title || '';
  document.getElementById('j-company').value = j.company || '';
  document.getElementById('j-location').value = j.location || '';
  document.getElementById('j-status').value = j.status || 'Saved';
  document.getElementById('j-notes').value = j.notes || '';
  document.getElementById('form-title').textContent = 'Edit Job';
  document.getElementById('form-save-btn').textContent = 'Save Changes';
  document.getElementById('add-form').style.display = '';
  document.getElementById('add-form').scrollIntoView({ behavior:'smooth', block:'center' });
}

async function removeJob(id){
  const ok = await confirmDialog({ title:'Remove job?', body:'This removes it from your tracker.', confirmText:'Remove', danger:true });
  if (!ok) return;
  jobs = jobs.filter(j=>j.id!==id); _save(); render();
}
function updateStatus(id, s){ const j=jobs.find(x=>x.id===id); if(j){ j.status=s; _save(); render(); } }

function _statusBadge(s){
  const c = STATUS_COLOR[s] || '#64748b';
  return `<span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:${c};background:${c}1f;border:1px solid ${c}40;border-radius:20px;padding:3px 10px;">
    <span style="width:6px;height:6px;border-radius:50%;background:${c};"></span>${esc(s)}</span>`;
}

function _renderStats(){
  const counts = {}; STATUSES.forEach(s=>counts[s]=0);
  jobs.forEach(j=>{ if(counts[j.status]!=null) counts[j.status]++; });
  document.getElementById('jt-stats').innerHTML = STATUSES.map(s=>{
    const c = STATUS_COLOR[s]; const active = filter===s;
    return `<button class="jt-stat${active?' active':''}" onclick="setFilter('${active?'all':s}')" style="--c:${c};">
      <span class="jt-stat-num">${counts[s]}</span>
      <span class="jt-stat-label">${s}</span>
    </button>`;
  }).join('');
}

function render(){
  const q = (document.getElementById('jt-search').value || '').toLowerCase();
  const list = jobs.filter(j => (filter==='all' || j.status===filter) &&
    (!q || [j.title,j.company,j.notes,j.location].some(v => (v||'').toLowerCase().includes(q))));
  document.getElementById('job-count').textContent = jobs.length + ' job' + (jobs.length===1?'':'s') + ' tracked';
  document.getElementById('empty').style.display = jobs.length===0 ? '' : 'none';
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('success', b.dataset.filter===filter));
  _renderStats();
  document.getElementById('job-list').innerHTML = (list.length===0 && jobs.length>0)
    ? `<div class="section-card" style="text-align:center;color:var(--muted);padding:30px;">No jobs match your search/filter.</div>`
    : list.map(j => `
    <div class="section-card jt-card" style="margin-bottom:10px;border-left:3px solid ${STATUS_COLOR[j.status]||'#64748b'};">
      <div style="display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;">
        <div style="min-width:0;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;">
            <h4 style="margin:0;">${esc(j.title)} <span style="color:var(--muted); font-weight:normal;">at</span> ${esc(j.company)}</h4>
            ${_statusBadge(j.status)}
          </div>
          <div style="color:var(--muted); font-size:12px;">${j.location?esc(j.location)+' · ':''}added ${new Date(j.addedAt).toLocaleDateString()}</div>
          ${j.notes ? `<p style="font-size:13px; margin-top:8px; word-break:break-word;">${esc(j.notes)}</p>`:''}
        </div>
        <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-end; flex-shrink:0;">
          <select onchange="updateStatus(${j.id}, this.value)" style="padding:5px 10px; background:var(--bg-2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px;">
            ${STATUSES.map(s=>`<option ${j.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
          <div style="display:flex;gap:4px;">
            <button class="btn btn-ghost btn-xs" onclick="editJob(${j.id})">${ICON('settings','ico ico-sm')} Edit</button>
            <button class="btn btn-ghost btn-xs" onclick="removeJob(${j.id})">${ICON('trash','ico ico-sm')} Remove</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}
function signOut(){ localStorage.removeItem('hf_token'); location.href='index.html'; }

document.getElementById('jt-title').innerHTML = `${ICON('briefcase','ico ico-lg')} <span>Job Tracker</span>`;
document.getElementById('add-btn').innerHTML = `${ICON('plus','ico ico-sm')} <span>Add Job</span>`;
document.getElementById('empty-icon').innerHTML = ICON('briefcase','ico ico-lg').replace('class="ico ico-lg"','class="ico" style="width:48px;height:48px;"');
document.getElementById('empty-btn').innerHTML = `${ICON('plus','ico ico-sm')} <span>Add Your First Job</span>`;
render();
</script>
</body>
</html>
