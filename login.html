<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Applio</title>
<link rel="icon" href="logo.ico">
<link rel="stylesheet" href="css/styles.css">
<script src="js/theme.js"></script>
</head>
<body class="auth-body">
<button class="theme-toggle" onclick="toggleTheme()" style="position:fixed;top:16px;right:16px;z-index:10;">☀️ Light</button>
  <div class="auth-card">
    <div class="brand">
      <img src="logo.jpeg" class="brand-logo" alt="Applio">
      <span>Applio</span>
    </div>

    <!-- Sign in -->
    <div id="view-signin">
      <h2>Welcome back</h2>
      <p class="sub">Sign in to continue</p>
      <div id="msg-signin" class="auth-msg"></div>
      <form id="form-signin">
        <div class="form-field">
          <label>Email</label>
          <input type="text" name="email" placeholder="you@example.com" autocomplete="username" required>
        </div>
        <div class="form-field">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>
      <div class="auth-foot">
        <a href="#" onclick="notify({title:'Password reset',body:'Password reset is coming soon. Contact support@appliohq.com if you need access now.'});return false;">Forgot password?</a>
        <span>Need an account? <a href="#" onclick="showView('signup');return false;">Sign up</a></span>
      </div>
    </div>

    <!-- Sign up -->
    <div id="view-signup" style="display:none;">
      <a href="#" class="btn btn-ghost btn-xs" onclick="showView('signin');return false;" style="margin-bottom:12px;display:inline-flex;">← Back to sign in</a>
      <h2>Create your account</h2>
      <p class="sub">Get started with Applio</p>
      <div id="msg-signup" class="auth-msg"></div>
      <form id="form-signup">
        <div class="form-field">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-field">
          <label>Password</label>
          <input type="password" name="password" placeholder="Min. 8 characters" minlength="8" required>
        </div>
        <div class="form-field">
          <label>Confirm Password</label>
          <input type="password" name="confirm" placeholder="Re-enter password" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/notify.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // initial view from ?mode=signup
    const params = new URLSearchParams(location.search);
    if (params.get('mode') === 'signup') showView('signup');
  </script>
</body>
</html>
