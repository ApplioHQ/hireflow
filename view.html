<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume — Applio</title>
<meta name="robots" content="noindex">
<link rel="icon" href="logo.ico">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #e8eaf2; color: #1f2937;
    font-family: -apple-system, BlinkMacSystemFont, Inter, "Segoe UI", Roboto, sans-serif; }
  .view-page { width: 816px; max-width: calc(100% - 32px); margin: 32px auto;
    background: #fff; border-radius: 6px; box-shadow: 0 12px 40px rgba(15,23,42,.18); overflow: hidden; }
  .view-loading, .view-msg { max-width: 460px; margin: 80px auto; text-align: center; padding: 0 20px; }
  .view-msg h1 { font-size: 24px; font-weight: 800; color: #111827; margin-bottom: 10px; }
  .view-msg p { color: #6b7280; font-size: 15px; line-height: 1.6; }
  .view-msg a, .view-footer a { color: #4f46e5; text-decoration: none; font-weight: 600; }
  .view-footer { text-align: center; padding: 20px; font-size: 13px; color: #6b7280; }
  @media print {
    body { background: #fff; }
    .view-page { box-shadow: none; margin: 0; width: 100%; max-width: 100%; border-radius: 0; }
    .view-footer { display: none; }
  }
</style>
</head>
<body>
<div id="view-root"><div class="view-loading" style="text-align:center;color:#6b7280;margin:80px auto;">Loading resume…</div></div>

<script src="js/config.js"></script>
<script src="js/templates.js"></script>
<script>
  const API = window.HIREFLOW_CONFIG.API_URL;
  const shareId = new URLSearchParams(location.search).get('id');

  function showError() {
    document.getElementById('view-root').innerHTML =
      '<div class="view-msg"><h1>This resume is no longer available</h1>' +
      '<p>The link may have been disabled by its owner, or it never existed.</p>' +
      '<p style="margin-top:18px;"><a href="index.html">Build your own with Applio →</a></p></div>';
  }

  function render(resume) {
    if (!resume) return showError();
    const accent = resume.customize && resume.customize.accent;
    const html = renderTemplate(resume.template || 'modern', resume, false, accent, 'Normal');
    document.getElementById('view-root').innerHTML =
      '<div class="view-page">' + html + '</div>' +
      '<div class="view-footer">Made with <a href="index.html">Applio</a> — the AI resume builder</div>';
  }

  (async function () {
    if (!shareId) return showError();
    try {
      const r = await fetch(API + '/public/resume/' + encodeURIComponent(shareId));
      if (!r.ok) return showError();
      const data = await r.json();
      render(data.resume);
    } catch (e) { showError(); }
  })();
</script>
</body>
</html>
