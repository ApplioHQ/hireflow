# ============================================================================
# hireflow-api — Cloudflare Worker configuration  (CANONICAL / PRODUCTION)
#
# ⚠️  THIS is the real production worker. Deploy ONLY from this directory:
#         cd worker && npx wrangler deploy            (production)
#         cd worker && npx wrangler deploy --env staging   (staging)
#     Or from the repo root:  npm run deploy  /  npm run deploy:staging
#
#     Do NOT deploy the repo-root worker.js — it is a stale/divergent copy
#     and has been quarantined under _archive-root-worker/.
#
# Required secrets (set once per environment with `npx wrangler secret put NAME`;
# secrets are NOT overwritten by `wrangler deploy`):
#   JWT_SECRET            random hex string
#   STRIPE_SECRET_KEY     sk_live_... (prod) / sk_test_... (staging)
#   STRIPE_WEBHOOK_KEY    whsec_...  (note: code reads env.STRIPE_WEBHOOK_KEY)
#   SUPERADMIN_EMAIL      superadmin login email
#   SUPERADMIN_PASSWORD   superadmin login password
#   ADMIN_PASSWORD        password for the built-in "ADMIN" account
# ============================================================================

name = "hireflow-api"
main = "worker.js"
compatibility_date = "2024-12-01"

[ai]
binding = "AI"

# Production KV — holds real user:*, resume:*, feedback:*, stripe_event:* records.
# (Corrected 2026-07-03: previously pointed at an empty namespace fc33acc4… .)
[[kv_namespaces]]
binding = "HIREFLOW_KV"
id = "84f236c3086b4ca7809be72b6969ea62"

[vars]
ALLOWED_ORIGIN = "https://appliohq.com,https://www.appliohq.com,https://codehost-commit.github.io"
SITE_URL = "https://appliohq.com"
PREMIUM_PRICE_ID = "price_1Te0TiF3oOWBYU0sE4yBkJXp"
LIFETIME_PRICE_ID = "price_1Te0WuF3oOWBYU0sPN3gqifR"
FREE_DOWNLOAD_LIMIT = "10"
# AI Gateway id — routes Workers AI calls through the gateway for caching/analytics.
# OPT-IN: leave empty to call Workers AI directly (safe default). Only set this to
# the id of a gateway you actually created (Dashboard > AI > AI Gateway); a wrong/
# missing id makes EVERY AI call fail. "" and "default" both mean "no gateway".
AI_GATEWAY_ID = ""

# ---------------------------------------------------------------------------
# Staging — `wrangler deploy --env staging`  (worker: hireflow-api-staging)
# Separate KV namespace so load/rate-limit tests NEVER touch production data.
# Use Stripe TEST-mode keys + price IDs here.
# ---------------------------------------------------------------------------
[env.staging]

[env.staging.ai]
binding = "AI"

# Dedicated staging KV namespace (created 2026-07-03) — empty, isolated from prod.
[[env.staging.kv_namespaces]]
binding = "HIREFLOW_KV"
id = "d89e0b29df9e4a30be0eb7f099d0cfc1"

[env.staging.vars]
ALLOWED_ORIGIN = "*"
SITE_URL = "https://hireflow-api-staging.pritamavuthu7.workers.dev"
# Stripe TEST-mode price IDs — staging must never process real payments.
PREMIUM_PRICE_ID = "price_TEST_premium"
LIFETIME_PRICE_ID = "price_TEST_lifetime"
FREE_DOWNLOAD_LIMIT = "10"
AI_GATEWAY_ID = ""
